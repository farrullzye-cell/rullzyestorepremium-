<!DOCTYPE html>
<html lang="id-ID" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SMM Panel - Followers & Likes Sosmed | RullzyeStore" />
    <meta property="og:description" content="SMM Panel murah: followers Instagram, TikTok, YouTube, Twitter. Bayar QRIS cepat." />
    <meta property="og:url" content="https://rullzyestorepremium.my.id/smmpanel.html" />
    <meta property="og:image" content="https://rullzyestorepremium.my.id/favicon.jpeg" />
    <meta property="og:site_name" content="RullzyeStore" />
    <meta property="og:locale" content="id_ID" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://rullzyestorepremium.my.id/smmpanel.html" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="theme-color" content="#7c3aed" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #03050f; color: #e2e8f0; min-height: 100vh; }
        .card-smm { background: rgba(15,23,42,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; cursor: pointer; transition: all 0.3s ease; }
        .card-smm:hover { transform: translateY(-4px); border-color: #7c3aed; box-shadow: 0 0 30px -8px rgba(124,58,237,0.2); }
        .modal-pop { animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { background: rgba(124,58,237,0.15); border-color: #7c3aed; color: #a78bfa; }
        .tab-btn:not(.active) { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #94a3b8; }
        .tab-btn:not(.active):hover { border-color: rgba(124,58,237,0.4); color: #c4b5fd; }
        .glass-input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: #fff; font-weight: 700; font-size: 0.875rem; width: 100%; padding: 0.875rem 1rem; transition: border-color 0.2s; }
        .glass-input:focus { outline: none; border-color: #7c3aed; }
        .glass-input::placeholder { color: #475569; }
        .btn-violet { background: linear-gradient(135deg, #7c3aed, #6d28d9); transition: all 0.25s; }
        .btn-violet:hover { transform: scale(1.02); box-shadow: 0 0 25px -5px rgba(124,58,237,0.4); }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "SMM Panel RullzyeStore",
      "description": "Layanan SMM panel: followers Instagram, TikTok, YouTube, Twitter, Facebook. Proses otomatis.",
      "url": "https://rullzyestorepremium.my.id/smmpanel.html",
      "provider": { "@type": "Organization", "name": "RullzyeStore", "url": "https://rullzyestorepremium.my.id" }
    }
    </script>
</head>
<body class="min-h-screen flex flex-col">
    <header class="fixed top-0 left-0 right-0 z-50 bg-[#03050f]/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2.5">
                <div class="bg-gradient-to-br from-violet-600 to-purple-700 p-2 rounded-xl shadow-lg shadow-violet-500/20">
                    <i class="fa-solid fa-users text-white text-xs"></i>
                </div>
                <span class="font-black text-lg text-white">SMM <span class="text-violet-400">Panel</span></span>
            </a>
            <a href="/" class="text-[11px] font-bold text-slate-400 hover:text-violet-400 bg-white/5 border border-white/10 px-3.5 py-1.5 rounded-full transition-all hover:border-violet-500/30">
                <i class="fa-solid fa-arrow-left mr-1.5"></i> Kembali
            </a>
        </div>
    </header>
    <section class="pt-24 pb-5 px-4 text-center max-w-3xl mx-auto w-full">
        <div class="inline-flex items-center gap-2 bg-violet-500/10 border border-violet-500/20 px-4 py-1.5 rounded-full mb-3 text-[10px] font-black text-violet-300 uppercase tracking-widest">
            Proses Otomatis 24 Jam
        </div>
        <h1 class="text-2xl sm:text-4xl font-black text-white mb-2 leading-tight">Suntik <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-purple-400">Sosial Media</span></h1>
        <p class="text-slate-400 text-xs sm:text-sm font-medium">Pilih layanan di bawah. Followers, likes, views — instan.</p>
    </section>
    <main class="flex-grow px-4 max-w-5xl mx-auto w-full pb-8">
        <div class="flex overflow-x-auto gap-2 mb-6 pb-2 no-scrollbar" id="category-tabs">
            <p class="text-sm font-bold text-slate-400 shrink-0"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Memuat...</p>
        </div>
        <div id="services-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4"></div>
    </main>
    <div id="modal-smm" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] hidden items-center justify-center p-3 sm:p-4">
        <div class="bg-[#0b1120] border border-white/10 rounded-[28px] w-full max-w-md p-5 sm:p-7 shadow-2xl shadow-violet-500/5 relative modal-pop max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-3 right-3 w-7 h-7 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center border border-white/10 transition">
                <i class="fa-solid fa-xmark text-slate-400 text-sm"></i>
            </button>
            <div id="step-form">
                <h3 class="text-lg font-black text-white mb-1">Detail Pesanan</h3>
                <p id="modal-service-name" class="text-[11px] font-bold text-violet-400 mb-4 bg-violet-500/10 inline-block px-3 py-1 rounded-lg"></p>
                <div class="mb-3.5">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Target <span class="text-slate-500 normal-case font-medium tracking-normal">(Link / Username)</span></label>
                    <input type="text" id="targetData" placeholder="Contoh: @username / https://..." class="glass-input">
                    <p class="text-[10px] text-rose-400 mt-1 font-bold">*Pastikan akun tidak di-private.</p>
                </div>
                <div class="mb-3.5">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Jumlah Pesanan</label>
                    <input type="number" id="qtyData" oninput="hitungTotal()" class="glass-input">
                    <p id="minmax-info" class="text-[10px] text-slate-500 mt-1 font-bold"></p>
                </div>
                <div class="mb-3.5">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Random ID Telegram</label>
                    <input type="text" id="randomId" placeholder="Contoh: ID-A1B2C3" class="glass-input uppercase">
                    <p class="text-[10px] text-violet-400 mt-1 font-bold">*Ketik /daftar di Bot untuk ID.</p>
                </div>
                <div class="bg-white/5 rounded-2xl border border-white/10 p-4 flex items-center justify-between mb-5">
                    <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Total</span>
                    <span id="modal-price" class="text-xl font-black text-violet-400">Rp 0</span>
                </div>
                <button onclick="prosesPesanan()" id="btn-pay" class="btn-violet w-full text-white font-bold py-3.5 rounded-2xl text-sm shadow-lg">Bayar Pakai QRIS</button>
            </div>
            <div id="step-qris" class="hidden text-center">
                <div id="modal-loader" class="py-10">
                    <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-violet-500 border-t-transparent mb-4"></div>
                    <p class="font-bold text-white">Menyiapkan QRIS...</p>
                </div>
                <div id="modal-final-content" class="hidden"></div>
            </div>
        </div>
    </div>
    <script>
        let allSmmData = [];
        let categories = [];
        let selectedService = null;
        let finalPrice = 0;
        function getSosmedIcon(name) {
            const n = name.toLowerCase();
            if(n.includes('instagram')) return { icon: 'fa-instagram', color: 'text-pink-400', bg: 'bg-pink-500/10' };
            if(n.includes('tiktok')) return { icon: 'fa-tiktok', color: 'text-white', bg: 'bg-slate-500/10' };
            if(n.includes('youtube')) return { icon: 'fa-youtube', color: 'text-red-400', bg: 'bg-red-500/10' };
            if(n.includes('twitter') || n.includes('x')) return { icon: 'fa-twitter', color: 'text-blue-400', bg: 'bg-blue-500/10' };
            if(n.includes('facebook')) return { icon: 'fa-facebook', color: 'text-blue-400', bg: 'bg-blue-500/10' };
            if(n.includes('telegram')) return { icon: 'fa-telegram', color: 'text-sky-400', bg: 'bg-sky-500/10' };
            return { icon: 'fa-star', color: 'text-violet-400', bg: 'bg-violet-500/10' };
        }
        fetch('/api/smm-products').then(r => r.json()).then(res => {
            const tabContainer = document.getElementById('category-tabs');
            if (res.success && res.data.length > 0) {
                allSmmData = res.data;
                allSmmData.forEach(item => {
                    if(!categories.includes(item.category)) categories.push(item.category);
                });
                tabContainer.innerHTML = '';
                categories.forEach(cat => {
                    tabContainer.innerHTML += `<button onclick="filterSosmed('${cat.replace(/'/g,"\\'")}')" class="tab-btn shrink-0 border px-4 py-2 rounded-full font-bold text-xs whitespace-nowrap">${cat}</button>`;
                });
                if(categories.length > 0) filterSosmed(categories[0]);
            } else {
                tabContainer.innerHTML = '<p class="text-rose-400 font-bold text-sm">Gagal menghubungkan ke API SMM.</p>';
            }
        });
        function filterSosmed(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.innerText.trim() === category.trim()) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            const grid = document.getElementById('services-grid');
            grid.innerHTML = '';
            const filtered = allSmmData.filter(item => item.category === category);
            filtered.forEach((item, index) => {
                const markupPrice = item.price + 2000;
                const s = getSosmedIcon(item.category);
                grid.innerHTML += `
                    <div class="card-smm p-4 relative" style="animation: pop 0.4s ease forwards; animation-delay: ${(index%20) * 0.03}s; opacity:0;" onclick="openModal('${item.id}', '${item.name.replace(/'/g,"\\'")}', ${markupPrice}, ${item.min}, ${item.max})">
                        <div class="flex items-start gap-3">
                            <div class="${s.bg} w-10 h-10 rounded-xl flex items-center justify-center shrink-0"><i class="fa-brands ${s.icon} ${s.color} text-lg"></i></div>
                            <div class="min-w-0">
                                <h3 class="font-black text-white text-[11px] leading-tight mb-2">${item.name}</h3>
                                <div class="flex flex-wrap items-center gap-1">
                                    <span class="bg-violet-500/10 text-violet-400 text-[9px] font-bold px-1.5 py-0.5 rounded border border-violet-500/20">Rp ${markupPrice.toLocaleString('id-ID')}/1K</span>
                                    <span class="bg-white/5 text-slate-500 text-[9px] font-bold px-1.5 py-0.5 rounded border border-white/10">Min: ${item.min}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        function openModal(id, name, pricePer1K, min, max) {
            selectedService = { id, name, pricePer1K, min, max };
            document.getElementById('modal-service-name').innerText = name;
            document.getElementById('targetData').value = '';
            document.getElementById('qtyData').value = min;
            document.getElementById('randomId').value = '';
            document.getElementById('minmax-info').innerText = `*Pesan minimal ${min} - maksimal ${max}`;
            hitungTotal();
            document.getElementById('step-form').classList.remove('hidden');
            document.getElementById('step-qris').classList.add('hidden');
            document.getElementById('modal-smm').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal-smm').style.display = 'none'; }
        function hitungTotal() {
            let qty = parseInt(document.getElementById('qtyData').value) || 0;
            finalPrice = Math.ceil((selectedService.pricePer1K / 1000) * qty);
            document.getElementById('modal-price').innerText = `Rp ${finalPrice.toLocaleString('id-ID')}`;
        }
        function prosesPesanan() {
            const target = document.getElementById('targetData').value;
            const qty = parseInt(document.getElementById('qtyData').value) || 0;
            const randomId = document.getElementById('randomId').value.trim();
            if (!target) return alert('Silakan masukkan Link/Username target!');
            if (qty < selectedService.min || qty > selectedService.max) return alert(`Jumlah pesanan harus antara ${selectedService.min} dan ${selectedService.max}!`);
            if (!randomId) return alert('Harap masukkan Random ID dari Bot Telegram!');
            document.getElementById('step-form').classList.add('hidden');
            document.getElementById('step-qris').classList.remove('hidden');
            document.getElementById('modal-loader').classList.remove('hidden');
            document.getElementById('modal-final-content').classList.add('hidden');
            fetch('/api/smm-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ service: selectedService.id, productName: selectedService.name, displayPrice: finalPrice, qty: qty, target: target, randomId: randomId })
            }).then(r => r.json()).then(res => {
                document.getElementById('modal-loader').classList.add('hidden');
                const f = document.getElementById('modal-final-content');
                f.classList.remove('hidden');
                if (res.status) {
                    f.innerHTML = `
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Tagihan SMM</p>
                        <h2 class="text-3xl font-black text-violet-400 mb-4">Rp ${res.invoice.amount.toLocaleString('id-ID')}</h2>
                        <div class="bg-white/5 p-4 rounded-3xl mb-4 flex justify-center border border-white/10"><img src="${res.invoice.qr_url}" class="w-40 h-40 rounded-xl border-4 border-white/10 shadow"></div>
                        <a href="${res.invoice.botLink}" target="_blank" class="block w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-4 rounded-2xl shadow mb-2 transition"><i class="fa-brands fa-telegram mr-2"></i> Lanjut ke Telegram</a>
                        <button onclick="closeModal()" class="text-slate-500 text-xs font-bold uppercase hover:text-slate-300 transition">Tutup</button>`;
                } else {
                    f.innerHTML = `<p class="text-rose-400 font-bold mb-3">${res.message || 'Gagal membuat QRIS.'}</p><button onclick="closeModal()" class="text-slate-500 text-xs font-bold uppercase">Tutup</button>`;
                }
            }).catch(() => {
                document.getElementById('modal-loader').classList.add('hidden');
                document.getElementById('modal-final-content').classList.remove('hidden');
                document.getElementById('modal-final-content').innerHTML = '<p class="text-white font-bold mb-3">Jaringan bermasalah.</p><button onclick="closeModal()" class="text-slate-500 text-xs font-bold uppercase">Tutup</button>';
            });
        }
    </script>
</body>
</html>
