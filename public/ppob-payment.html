<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembayaran QRIS - RullzyeStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .qr-wrapper {
            background: #fff;
            padding: 12px;
            border-radius: 20px;
            display: inline-flex;
            box-shadow: 0 0 0 1px rgba(124,58,237,0.15);
        }
        .qr-wrapper img {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            display: block;
        }
        .info-box {
            background: rgba(124,58,237,0.08);
            border: 1px solid rgba(124,58,237,0.15);
            border-radius: 16px;
            padding: 16px;
        }
    </style>
</head>
<body>

    <div class="glass scale-in" style="max-width: 440px; width: 100%; padding: 24px; border-radius: 28px; text-align: center;">

        <!-- Header -->
        <div style="margin-bottom: 24px;">
            <div style="width: 64px; height: 64px; margin: 0 auto 12px; border-radius: 18px; background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(99,102,241,0.1)); display: flex; align-items: center; justify-content: center; position: relative;">
                <div style="position: absolute; inset: -2px; border-radius: 20px; background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(99,102,241,0.1)); z-index: -1;"></div>
                <i class="fa-solid fa-qrcode" style="color: #c084fc; font-size: 26px;"></i>
            </div>
            <h1 class="gradient-text" style="font-size: 22px; font-weight: 800; margin-bottom: 4px;">Scan QRIS</h1>
            <p style="color: var(--text-secondary); font-size: 13px;">Bayar sebelum transaksi diproses</p>
        </div>

        <!-- QR Code -->
        <div class="fade-up" style="margin-bottom: 24px;">
            <div class="qr-wrapper" id="qr-container">
                <img id="qr-image" src="" alt="QR Code">
            </div>
            <p id="qr-fallback" style="display: none; color: var(--text-muted); font-size: 13px;">QR tidak tersedia</p>
        </div>

        <!-- Total Tagihan -->
        <p style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 4px;">Total Tagihan</p>
        <h2 id="amount-display" class="gradient-text" style="font-size: 36px; font-weight: 800; margin-bottom: 24px;">Rp 0</h2>

        <!-- Info / Instruksi -->
        <div class="info-box" style="margin-bottom: 24px; text-align: left; font-size: 12px; color: var(--text-secondary); line-height: 1.6;">
            <p style="margin-bottom: 6px;"><i class="fa-solid fa-circle-info" style="color: var(--accent-light); width: 18px; text-align: center; margin-right: 6px;"></i> Jangan tutup halaman ini setelah scan.</p>
            <p style="margin-bottom: 6px;"><i class="fa-solid fa-check-circle" style="color: var(--success); width: 18px; text-align: center; margin-right: 6px;"></i> Setelah pembayaran terverifikasi, layanan akan otomatis diproses.</p>
            <p><i class="fa-brands fa-telegram" style="color: var(--accent-light); width: 18px; text-align: center; margin-right: 6px;"></i> Notifikasi akan dikirim ke Telegram Anda.</p>
        </div>

        <!-- Tombol Aksi -->
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <a id="bot-link" href="#" target="_blank" class="btn-primary" style="padding: 14px 24px; border-radius: 18px; font-size: 14px;">
                <i class="fa-brands fa-telegram"></i> Konfirmasi via Bot
            </a>
            <button onclick="window.location.href='/ppob.html'" class="btn-outline" style="padding: 12px 24px; border-radius: 18px; font-size: 13px; justify-content: center;">
                Pilih Layanan Lain
            </button>
        </div>

        <!-- Order ID -->
        <p style="font-size: 10px; color: var(--text-muted); margin-top: 20px;">
            Order ID: <span id="order-id" style="font-family: monospace; font-weight: 700; color: var(--text-secondary);"></span>
        </p>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId') || 'Tidak diketahui';
        const amount = urlParams.get('amount') || '0';
        const qrUrl = decodeURIComponent(urlParams.get('qr_url') || '');
        const botLink = decodeURIComponent(urlParams.get('botLink') || '');

        document.getElementById('order-id').innerText = orderId;
        document.getElementById('amount-display').innerText = 'Rp ' + Number(amount).toLocaleString('id-ID');

        const qrImg = document.getElementById('qr-image');
        const qrContainer = document.getElementById('qr-container');
        const qrFallback = document.getElementById('qr-fallback');

        if (qrUrl) {
            qrImg.src = qrUrl;
        } else {
            qrContainer.style.display = 'none';
            qrFallback.style.display = 'block';
            qrFallback.innerText = 'QR Code tidak tersedia, silakan gunakan link Bot untuk konfirmasi.';
        }

        const botLinkEl = document.getElementById('bot-link');
        if (botLink) {
            botLinkEl.href = botLink;
        } else {
            botLinkEl.style.display = 'none';
        }
    </script>
</body>
</html>
