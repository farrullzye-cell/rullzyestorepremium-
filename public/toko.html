<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Digital Affiliate - RullzyeStore Premium</title>
    <meta name="description" content="Toko digital affiliate RullzyeStore. Temukan produk pulsa, akun premium, dan layanan PPOB dengan harga spesial." />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Toko Affiliate - RullzyeStore" />
    <meta property="og:description" content="Toko digital affiliate dengan produk pulsa, PPOB, dan akun premium." />
    <meta property="og:url" content="https://rullzyestorepremium.my.id/toko/" />
    <meta property="og:image" content="https://rullzyestorepremium.my.id/favicon.jpeg" />
    <meta property="og:site_name" content="RullzyeStore" />
    <meta property="og:locale" content="id_ID" />
    <link rel="canonical" href="https://rullzyestorepremium.my.id/" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="theme-color" content="#6d28d9" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #7c3aed; --theme: rgba(124,58,237,0.12); --glow: rgba(124,58,237,0.3); --border: rgba(124,58,237,0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #03050f;
            color: #e2e8f0;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 0%, var(--theme) 0%, transparent 60%);
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 4px; }

        .glass {
            background: rgba(15,23,42,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .glass-strong {
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .product-card {
            transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
            background: rgba(15,23,42,0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 16px;
            cursor: pointer;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px -16px var(--glow);
            border-color: var(--border);
        }
        .product-card:active { transform: translateY(-2px); }

        .social-btn {
            width: 44px; height: 44px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
        }
        .social-btn:hover {
            transform: scale(1.12) translateY(-2px);
            background: rgba(255,255,255,0.08);
            border-color: var(--border);
        }

        .avatar-ring {
            padding: 3px;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            border-radius: 50%;
            box-shadow: 0 0 30px -8px var(--glow);
        }

        .search-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            transition: border-color 0.25s;
        }
        .search-box:focus-within { border-color: var(--border); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

        .cat-pill {
            transition: all 0.2s;
            font-size: 11px; font-weight: 600;
            padding: 5px 16px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.06);
            color: #64748b; white-space: nowrap; cursor: pointer;
            background: transparent;
        }
        .cat-pill:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.12); }
        .cat-pill.active { background: var(--accent); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-bg { animation: fadeIn 0.2s ease; }

        #loading { position: fixed; inset: 0; background: #03050f; z-index: 999; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.06); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .view-btn { transition: all 0.2s; cursor: pointer; padding: 6px; border-radius: 8px; }
        .view-btn:hover { background: rgba(255,255,255,0.05); }

        @media (max-width: 380px) {
            .product-card { border-radius: 12px; }
            .avatar-ring { width: 72px; height: 72px; }
            #shopName { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div id="app" class="max-w-lg mx-auto px-4 sm:px-6 py-6 hidden">

    <!-- Header / Profile -->
    <div class="text-center mb-8 fade-up">
        <div class="avatar-ring w-24 h-24 sm:w-28 sm:h-28 mx-auto mb-5">
            <div id="avatarImg" class="w-full h-full rounded-full bg-slate-800 flex items-center justify-center overflow-hidden">
                <i class="fa-solid fa-store text-3xl text-slate-500"></i>
            </div>
        </div>
        <h1 id="shopName" class="text-2xl sm:text-3xl font-black text-white tracking-tight"></h1>
        <p id="shopBio" class="text-sm text-slate-400 mt-1.5 max-w-xs mx-auto leading-relaxed"></p>
        <p class="text-[10px] text-slate-500 mt-3">Powered by <a href="/" class="text-violet-400 hover:underline hover:text-violet-300 transition-colors" id="poweredBy">RullzyeStore</a></p>
    </div>

    <!-- Social Links -->
    <div id="socialBar" class="flex justify-center gap-3 mb-8 fade-up" style="animation-delay:0.08s"></div>

    <!-- CTA Button -->
    <div class="mb-8 fade-up" style="animation-delay:0.12s">
        <a id="ctaTelegram" href="#" target="_blank"
           class="group relative block w-full text-center py-3.5 rounded-2xl font-bold text-sm text-white overflow-hidden transition-all duration-300 hover:scale-[1.01] active:scale-[0.99]"
           style="background:var(--accent)">
            <span class="relative z-10"><i class="fa-brands fa-telegram mr-2"></i>Gabung via Telegram</span>
            <span class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
        </a>
    </div>

    <!-- Search -->
    <div class="mb-4 fade-up" style="animation-delay:0.16s">
        <div class="search-box flex items-center px-4 py-3 gap-3">
            <i class="fa-solid fa-search text-slate-500 text-sm"></i>
            <input type="text" id="searchInput" placeholder="Cari produk..."
                   class="bg-transparent outline-none text-sm text-white flex-1 placeholder-slate-500 min-w-0">
        </div>
    </div>

    <!-- Categories -->
    <div id="categoryBar" class="flex gap-2 overflow-x-auto pb-3 mb-5 fade-up" style="animation-delay:0.2s"></div>

    <!-- Product Count + View Toggle -->
    <div class="flex justify-between items-center mb-4 fade-up" style="animation-delay:0.24s">
        <p id="productCount" class="text-xs text-slate-400 font-semibold"></p>
        <div class="flex gap-1">
            <button onclick="setView('grid')" id="btnGrid" class="view-btn text-slate-400 hover:text-white text-sm"><i class="fa-solid fa-grid-2"></i></button>
            <button onclick="setView('list')" id="btnList" class="view-btn text-slate-400 hover:text-white text-sm"><i class="fa-solid fa-list"></i></button>
        </div>
    </div>

    <!-- Products -->
    <div id="productGrid" class="grid grid-cols-2 gap-3 mb-8 fade-up" style="animation-delay:0.28s"></div>

    <!-- Footer -->
    <div class="text-center py-5 border-t border-white/5 mt-4">
        <p class="text-[10px] text-slate-600">&copy; 2026 <span id="footerName"></span> &middot; <a href="/" class="text-violet-400 hover:text-violet-300 transition-colors hover:underline">RullzyeStore</a></p>
    </div>
</div>

<!-- Order Modal -->
<div id="orderModal" class="fixed inset-0 z-50 hidden"></div>

<script>
const refCode = window.location.pathname.split('/toko/')[1] || '';
let profile = {};
let allProducts = [];
let filteredProducts = [];
let currentCategory = 'all';
let viewMode = 'grid';

async function init() {
    if (!refCode) return showError('Link toko tidak valid.');
    try {
        const res = await fetch(`/api/toko/${refCode}`);
        const data = await res.json();
        if (!data.success) return showError(data.message || 'Toko tidak ditemukan.');
        profile = data.profile;
        allProducts = data.products || [];
        filteredProducts = [...allProducts];
        applyTheme();
        renderProfile();
        renderSocials();
        renderCategories();
        renderProducts();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        document.title = `${profile.name} — Toko Digital`;
    } catch(e) { showError('Gagal memuat toko.'); }
}

function showError(msg) {
    document.getElementById('loading').innerHTML = `<div class="text-center"><i class="fa-solid fa-store-slash text-4xl text-slate-600 mb-4"></i><p class="text-slate-400 text-sm">${msg}</p><a href="/" class="text-violet-400 text-xs mt-2 inline-block hover:underline">Kembali ke Beranda</a></div>`;
}

function applyTheme() {
    const c = profile.themeColor || '#7c3aed';
    document.documentElement.style.setProperty('--accent', c);
    document.documentElement.style.setProperty('--theme', c + '1f');
    document.documentElement.style.setProperty('--glow', c + '4d');
    document.documentElement.style.setProperty('--border', c + '66');
}

function renderProfile() {
    document.getElementById('shopName').innerText = profile.name;
    document.getElementById('shopBio').innerText = profile.bio || 'Toko digital terpercaya';
    document.getElementById('footerName').innerText = profile.name;
    document.getElementById('poweredBy').innerText = profile.storeName;
    document.getElementById('ctaTelegram').href = `https://t.me/${profile.botUsername}?start=${profile.refCode}`;
    if (profile.avatar) {
        document.getElementById('avatarImg').innerHTML = `<img src="${profile.avatar}" alt="${profile.name}" class="w-full h-full object-cover rounded-full">`;
    } else {
        const initials = profile.name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
        document.getElementById('avatarImg').innerHTML = `<span class="text-2xl font-black text-white">${initials}</span>`;
        document.getElementById('avatarImg').style.background = profile.themeColor || '#7c3aed';
    }
}

function renderSocials() {
    const sl = profile.socialLinks || {};
    const icons = {
        instagram: { icon: 'fa-brands fa-instagram', color: 'text-pink-400', url: v => `https://instagram.com/${v}` },
        tiktok: { icon: 'fa-brands fa-tiktok', color: 'text-white', url: v => `https://tiktok.com/@${v}` },
        whatsapp: { icon: 'fa-brands fa-whatsapp', color: 'text-emerald-400', url: v => `https://wa.me/${v}` },
        youtube: { icon: 'fa-brands fa-youtube', color: 'text-red-400', url: v => `https://youtube.com/@${v}` },
        telegram: { icon: 'fa-brands fa-telegram', color: 'text-sky-400', url: v => `https://t.me/${v}` },
        shopee: { icon: 'fa-solid fa-bag-shopping', color: 'text-orange-400', url: v => v },
        website: { icon: 'fa-solid fa-globe', color: 'text-violet-400', url: v => v.startsWith('http') ? v : 'https://'+v }
    };
    const bar = document.getElementById('socialBar');
    let html = '';
    Object.entries(sl).forEach(([key, val]) => {
        if (!val || !icons[key]) return;
        const i = icons[key];
        html += `<a href="${i.url(val)}" target="_blank" class="social-btn"><i class="${i.icon} ${i.color}"></i></a>`;
    });
    bar.innerHTML = html;
    if (!html) bar.style.display = 'none';
}

function renderCategories() {
    const cats = new Set();
    allProducts.forEach(p => cats.add(p.category || p.source || 'Lainnya'));
    const bar = document.getElementById('categoryBar');
    let html = `<button onclick="filterCat('all')" class="cat-pill active">Semua</button>`;
    cats.forEach(c => {
        html += `<button onclick="filterCat('${c}')" class="cat-pill">${c}</button>`;
    });
    bar.innerHTML = html;
}

function filterCat(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    applyFilters();
}

document.getElementById('searchInput')?.addEventListener('input', applyFilters);

function applyFilters() {
    const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
    filteredProducts = allProducts.filter(p => {
        const matchCat = currentCategory === 'all' || (p.category || p.source || 'Lainnya') === currentCategory;
        const matchSearch = !q || p.name.toLowerCase().includes(q);
        return matchCat && matchSearch;
    });
    renderProducts();
}

function setView(mode) {
    viewMode = mode;
    document.getElementById('btnGrid').classList.toggle('text-white', mode === 'grid');
    document.getElementById('btnList').classList.toggle('text-white', mode === 'list');
    renderProducts();
}

function getIcon(name) {
    const n = name.toLowerCase();
    if (n.includes('pulsa')||n.includes('telkomsel')) return '<i class="fa-solid fa-signal text-amber-400"></i>';
    if (n.includes('data')||n.includes('gb')||n.includes('kuota')) return '<i class="fa-solid fa-wifi text-sky-400"></i>';
    if (n.includes('game')||n.includes('ml')||n.includes('free fire')) return '<i class="fa-solid fa-gamepad text-emerald-400"></i>';
    if (n.includes('netflix')) return '<i class="fa-solid fa-play text-rose-400"></i>';
    if (n.includes('spotify')) return '<i class="fa-solid fa-music text-emerald-400"></i>';
    return '<i class="fa-solid fa-gem text-violet-400"></i>';
}

function renderProducts() {
    const grid = document.getElementById('productGrid');
    document.getElementById('productCount').innerText = `${filteredProducts.length} produk`;
    if (filteredProducts.length === 0) {
        grid.innerHTML = `<div class="col-span-2 text-center py-12"><i class="fa-solid fa-box-open text-3xl text-slate-600 mb-3"></i><p class="text-slate-500 text-sm">Tidak ada produk ditemukan</p></div>`;
        return;
    }
    grid.className = viewMode === 'grid' ? 'grid grid-cols-2 gap-3 mb-8' : 'flex flex-col gap-2 mb-8';

    grid.innerHTML = filteredProducts.map(p => {
        if (viewMode === 'list') {
            return `<div class="product-card p-3 flex items-center gap-3" onclick="openOrder('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.source}')">
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center flex-shrink-0">${getIcon(p.name)}</div>
                <div class="flex-1 min-w-0"><h3 class="font-bold text-white text-xs truncate">${p.name}</h3><p class="text-[10px] text-slate-500">${p.category||p.source||''}</p></div>
                <p class="text-xs font-black whitespace-nowrap" style="color:var(--accent)">Rp ${p.price.toLocaleString('id-ID')}</p>
            </div>`;
        }
        return `<div class="product-card p-4" onclick="openOrder('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.source}')">
            <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center mb-3">${getIcon(p.name)}</div>
            <h3 class="font-bold text-white text-[11px] leading-tight line-clamp-2 mb-2">${p.name}</h3>
            ${p.stock <= 0 ? '<span class="text-[9px] bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full font-bold">Habis</span>' : ''}
            <p class="text-xs font-black mt-1" style="color:var(--accent)">Rp ${p.price.toLocaleString('id-ID')}</p>
        </div>`;
    }).join('');
}

// State untuk promo
let promoData = null;
let promoCache = [];

async function loadPromos() {
    try { const r = await fetch('/api/promos'); const d = await r.json(); promoCache = d.promos || []; } catch(e) { promoCache = []; }
}

function getPromoForProduct(productId, qty) {
    const pid = productId.startsWith('PREMKU-') ? productId.replace('PREMKU-','') : productId;
    return promoCache.find(p => {
        const targetMatch = !p.targetProductIds?.length || p.targetProductIds.includes(productId) || p.targetProductIds.includes('PREMKU-'+pid);
        let qtyMatch = true;
        if (p.type === 'qty_discount') qtyMatch = p.tiers?.some(t => t.qty == qty);
        else if (p.type === 'bogo_same') qtyMatch = qty >= 2;
        else qtyMatch = qty >= 1;
        return targetMatch && qtyMatch;
    }) || null;
}

function openOrder(id, name, price, source) {
    loadPromos();
    const modal = document.getElementById('orderModal');
    const needTarget = source === 'ppob' || source === 'game';
    const qty = 1;
    modal.className = 'fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 modal-bg';
    modal.style.background = 'rgba(0,0,0,0.7)';
    modal.innerHTML = `
        <div class="glass-strong rounded-3xl w-full max-w-md p-6 fade-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-black text-white">Pesan Produk</h3>
                <button onclick="document.getElementById('orderModal').className='fixed inset-0 z-50 hidden'" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="bg-white/5 rounded-xl p-3 mb-4 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:var(--accent,#7c3aed)">${getIcon(name)}</div>
                <div class="flex-1"><p class="font-bold text-white text-sm">${name}</p>
                <p id="m-unit-price" class="text-xs font-black" style="color:var(--accent)">Rp ${price.toLocaleString('id-ID')}</p></div>
            </div>
            <div id="promo-banner" class="hidden mb-3 px-3 py-2 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-[10px] font-bold text-emerald-400 flex items-center gap-2"><i class="fa-solid fa-tag"></i><span id="promo-text"></span></div>
            <div class="mb-3">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Jumlah</label>
                <div class="flex items-center gap-3 mt-1">
                    <button onclick="changeQty(-1,'${id.replace(/'/g,"\\'")}','${name.replace(/'/g,"\\'")}',${price},'${source}')" class="w-9 h-9 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition font-bold text-lg"><i class="fa-solid fa-minus text-xs"></i></button>
                    <span id="m-qty" class="text-2xl font-black text-white w-8 text-center">1</span>
                    <button onclick="changeQty(1,'${id.replace(/'/g,"\\'")}','${name.replace(/'/g,"\\'")}',${price},'${source}')" class="w-9 h-9 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition font-bold text-lg"><i class="fa-solid fa-plus text-xs"></i></button>
                </div>
            </div>
            <div class="bg-white/5 rounded-xl p-3 mb-4 flex items-center justify-between">
                <span class="text-xs text-slate-400 font-bold">Total</span>
                <div class="text-right">
                    <p id="m-total-original" class="text-xs text-slate-500 line-through hidden"></p>
                    <p id="m-total" class="text-lg font-black" style="color:var(--accent,#7c3aed)">Rp ${price.toLocaleString('id-ID')}</p>
                </div>
            </div>
            <div class="space-y-3">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Random ID Telegram</label>
                <input type="text" id="m-rid" placeholder="ID-ABC123" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm uppercase font-bold text-white mt-1 outline-none focus:border-violet-500 transition-colors"></div>
                ${needTarget ? `<div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nomor / UID Tujuan</label>
                <input type="text" id="m-target" placeholder="08xxx / 12345" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white mt-1 outline-none focus:border-violet-500 transition-colors"></div>` : ''}
            </div>
            <button id="btn-submit" onclick="submitOrder('${id}','${name.replace(/'/g,"\\'")}',${price},'${source}')"
                    class="relative w-full mt-4 py-3.5 rounded-2xl font-bold text-sm text-white overflow-hidden transition-all duration-300 hover:shadow-lg"
                    style="background:var(--accent,#7c3aed)">
                <span class="relative z-10"><i class="fa-solid fa-lock mr-1"></i> Bayar Sekarang</span>
                <span class="absolute inset-0 bg-white/10 opacity-0 hover:opacity-100 transition-opacity duration-300"></span>
            </button>
        </div>`;
    // Hitung harga awal
    setTimeout(() => recalcPrice('${id.replace(/'/g,"\\'")}', ${price}), 100);
}

async function changeQty(delta, id, name, unitPrice, source) {
    const el = document.getElementById('m-qty');
    let qty = parseInt(el.innerText) + delta;
    if (qty < 1) qty = 1;
    if (qty > 10) qty = 10;
    el.innerText = qty;
    await recalcPrice(id, unitPrice);
}

async function recalcPrice(id, unitPrice) {
    const qty = parseInt(document.getElementById('m-qty').innerText) || 1;
    const promo = getPromoForProduct(id, qty);
    const originalTotal = unitPrice * qty;
    const totalEl = document.getElementById('m-total');
    const origEl = document.getElementById('m-total-original');
    const banner = document.getElementById('promo-banner');
    const promoText = document.getElementById('promo-text');

    if (promo) {
        promoData = { promoId: promo.id, qty, originalTotal };
        try {
            const pid = id.startsWith('PREMKU-') ? id.replace('PREMKU-','') : id;
            const r = await fetch('/api/calculate-price', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ productId: pid, quantity: qty, promoId: promo.id }) });
            const d = await r.json();
            if (d.success) {
                totalEl.innerText = 'Rp ' + d.finalPrice.toLocaleString('id-ID');
                origEl.classList.remove('hidden');
                origEl.innerText = 'Rp ' + d.originalTotal.toLocaleString('id-ID');
                banner.classList.remove('hidden');
                const tipeLabel = promo.type === 'bogo_same' ? '🎁 BOGO — Bayar 1 Dapat 2!' : promo.type === 'bogo_diff' ? '🎁 BOGO — Gratis Produk Lain!' : '🏷️ ' + promo.name;
                promoText.innerText = tipeLabel + ' — Hemat Rp ' + d.discountRp.toLocaleString('id-ID');
                promoData.finalPrice = d.finalPrice;
                promoData.discountRp = d.discountRp;
                promoData.promoName = d.promoName;
                return;
            }
        } catch(e) {}
    }
    promoData = null;
    totalEl.innerText = 'Rp ' + originalTotal.toLocaleString('id-ID');
    origEl.classList.add('hidden');
    banner.classList.add('hidden');
}

async function submitOrder(id, name, unitPrice, source) {
    const rid = document.getElementById('m-rid')?.value.trim().toUpperCase();
    const target = document.getElementById('m-target')?.value.trim();
    const qty = parseInt(document.getElementById('m-qty')?.innerText) || 1;
    if (!rid) return alert('Masukkan Random ID!');
    if ((source==='ppob'||source==='game') && !target) return alert('Masukkan nomor tujuan!');

    const pid = id.startsWith('PREMKU-') ? id.replace('PREMKU-','') : id;
    let finalPrice = unitPrice * qty;
    let body;
    let endpoint;

    if (source === 'ppob') {
        endpoint = '/api/ppob-order';
        body = { productId: id.replace('PPOB-',''), productName: name, displayPrice: finalPrice, randomId: rid, target: target || rid };
    } else {
        endpoint = '/api/order';
        body = { service: pid, productName: name, displayPrice: finalPrice, randomId: rid, target: target || rid, quantity: qty };
        if (promoData && promoData.promoId && promoData.finalPrice) {
            body.promoId = promoData.promoId;
            body.originalTotal = promoData.originalTotal || (unitPrice * qty);
            body.displayPrice = promoData.finalPrice;
            body.quantity = qty;
        }
    }

    try {
        const res = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const data = await res.json();
        const modal = document.getElementById('orderModal');
        if (data.status && data.invoice) {
            let extraInfo = '';
            if (promoData && promoData.promoName) extraInfo = `<p class="text-[10px] text-emerald-400 font-bold mt-1">🏷️ ${promoData.promoName}</p>`;
            modal.querySelector('.glass-strong').innerHTML = `<div class="text-center fade-up">
                <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-3" style="background:var(--accent)"><i class="fa-solid fa-qrcode text-white text-xl"></i></div>
                <h3 class="text-lg font-black text-white mb-1">Scan QRIS</h3>
                <p class="text-xs text-slate-400 mb-4">Scan QR di bawah untuk membayar</p>
                <img src="${data.invoice.qr_url}" class="w-44 h-44 mx-auto rounded-2xl border border-white/10 mb-3">
                <p class="text-xl font-black text-white">Rp ${data.invoice.amount.toLocaleString('id-ID')}</p>
                ${extraInfo}
                <a href="${data.invoice.botLink}" target="_blank" class="block mt-4 py-3 rounded-xl text-sm font-bold text-white transition-all hover:shadow-lg" style="background:var(--accent)"><i class="fa-brands fa-telegram mr-1"></i>Konfirmasi via Bot</a>
                <button onclick="document.getElementById('orderModal').className='fixed inset-0 z-50 hidden'" class="mt-3 text-xs text-slate-400 hover:text-white transition-colors">Tutup</button>
            </div>`;
        } else {
            alert(data.message || 'Gagal membuat pesanan');
            modal.className = 'fixed inset-0 z-50 hidden';
        }
    } catch(e) { alert('Gagal terhubung ke server.'); }
}

init();
</script>
