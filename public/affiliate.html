<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Affiliate — RullzyeStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #03050f; color: #e2e8f0; min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(139,92,246,0.04) 0%, transparent 50%),
            radial-gradient(circle at 90% 80%, rgba(99,102,241,0.05) 0%, transparent 50%); }
        .glass { background: rgba(15,23,42,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; }
        .glow-card { transition: all 0.3s; }
        .glow-card:hover { box-shadow: 0 8px 30px -10px rgba(139,92,246,0.3); border-color: rgba(139,92,246,0.4); transform: translateY(-2px); }
        .stat-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { background: rgba(139,92,246,0.2); color: #c084fc; border-color: rgba(139,92,246,0.5); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fadeUp 0.4s ease forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<!-- Header -->
<header class="sticky top-0 z-50 bg-[#03050f]/80 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-6xl mx-auto px-4 h-14 flex justify-between items-center">
        <a href="/" class="flex items-center gap-2">
            <div class="bg-gradient-to-br from-violet-600 to-purple-600 p-2 rounded-xl"><i class="fa-solid fa-gem text-white text-xs"></i></div>
            <span class="font-black text-lg text-white">Rullzye<span class="text-violet-400">Store</span></span>
        </a>
        <div class="flex items-center gap-2">
            <span id="headerName" class="text-xs text-slate-400 hidden sm:inline"></span>
            <button onclick="logoutAffiliate()" id="btnLogout" class="hidden text-xs text-red-400 bg-red-400/10 px-3 py-1.5 rounded-full font-bold hover:bg-red-400/20"><i class="fa-solid fa-right-from-bracket mr-1"></i>Keluar</button>
        </div>
    </div>
</header>

<!-- LOGIN -->
<div id="loginSection" class="flex-grow flex items-center justify-center px-4">
    <div class="glass p-8 max-w-sm w-full text-center fade-up">
        <div class="w-16 h-16 bg-gradient-to-br from-violet-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg shadow-violet-500/20">
            <i class="fa-solid fa-handshake text-white text-2xl"></i>
        </div>
        <h2 class="text-xl font-black text-white mb-1">Dashboard Affiliate</h2>
        <p class="text-xs text-slate-400 mb-6">Masukkan Random ID untuk mengelola toko affiliate</p>
        <input type="text" id="inputRandomId" placeholder="ID-ABC123" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 text-sm uppercase font-bold text-center text-white placeholder-slate-500 focus:border-violet-500 outline-none mb-3">
        <button onclick="loginAffiliate()" class="w-full bg-gradient-to-r from-violet-600 to-purple-600 text-white font-bold py-3.5 rounded-xl text-sm hover:shadow-lg hover:shadow-violet-500/20 transition">Masuk Dashboard</button>
        <p class="text-[10px] text-slate-500 mt-4">Belum punya ID? Daftar via <a href="https://t.me/RullzyeBot" class="text-violet-400 underline">Bot Telegram</a></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardSection" class="hidden flex-grow pb-10 px-4 max-w-6xl mx-auto w-full pt-6">

    <!-- Profile Card -->
    <div class="glass p-5 mb-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 fade-up border-l-4 border-violet-500">
        <div>
            <h1 class="text-lg font-black text-white">Halo, <span id="affName" class="text-violet-400"></span> 👋</h1>
            <p class="text-xs text-slate-400 mt-0.5">Kode: <code id="affCode" class="text-violet-300 bg-white/5 px-2 py-0.5 rounded"></code>
                <button onclick="editProfile()" class="text-violet-400 ml-2 text-[10px] font-bold hover:underline"><i class="fa-solid fa-pen"></i> Edit Profil</button>
            </p>
            <p id="affBio" class="text-[11px] text-slate-500 mt-1 max-w-md"></p>
        </div>
        <div class="bg-gradient-to-br from-violet-600/20 to-purple-600/20 border border-violet-500/20 px-6 py-4 rounded-2xl text-center min-w-[160px]">
            <p class="text-[10px] text-violet-300 uppercase font-bold tracking-widest mb-1">Saldo Komisi</p>
            <h2 id="saldoKomisi" class="text-2xl font-black text-white">Rp 0</h2>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5" id="statsGrid"></div>
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-5" id="actionGrid"></div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
        <button onclick="switchDashTab('links')" data-tab="links" class="tab-btn active text-xs font-bold px-4 py-2 rounded-full border border-white/10 whitespace-nowrap"><i class="fa-solid fa-link mr-1"></i>Link</button>
        <button onclick="switchDashTab('tampilan')" data-tab="tampilan" class="tab-btn text-xs font-bold px-4 py-2 rounded-full border border-white/10 whitespace-nowrap"><i class="fa-solid fa-palette mr-1"></i>Tampilan</button>
        <button onclick="switchDashTab('settings')" data-tab="settings" class="tab-btn text-xs font-bold px-4 py-2 rounded-full border border-white/10 whitespace-nowrap"><i class="fa-solid fa-cog mr-1"></i>Produk</button>
        <button onclick="switchDashTab('downline')" data-tab="downline" class="tab-btn text-xs font-bold px-4 py-2 rounded-full border border-white/10 whitespace-nowrap"><i class="fa-solid fa-users mr-1"></i>Downline</button>
        <button onclick="switchDashTab('history')" data-tab="history" class="tab-btn text-xs font-bold px-4 py-2 rounded-full border border-white/10 whitespace-nowrap"><i class="fa-solid fa-clock-rotate-left mr-1"></i>Riwayat</button>
        <button onclick="switchDashTab('withdraw')" data-tab="withdraw" class="tab-btn text-xs font-bold px-4 py-2 rounded-full border border-white/10 whitespace-nowrap"><i class="fa-solid fa-money-bill-transfer mr-1"></i>Withdraw</button>
    </div>

    <!-- Tab Content -->
    <div id="tabContent"></div>
</div>

<script>
let currentProfile = {};
let dashData = {};
let affiliateProducts = [];
let currentProductCategory = 'all';
let productSearchTerm = '';

function switchDashTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); if(b.dataset.tab === tab) b.classList.add('active'); });
    renderTab(tab);
}

function renderTab(tab) {
    const c = document.getElementById('tabContent');
    if (tab === 'links') {
        c.innerHTML = `<div class="glass p-5 glow-card fade-up">
            <h3 class="font-bold text-white mb-4"><i class="fa-solid fa-link text-violet-400 mr-2"></i>Link Affiliate</h3>
            <div class="grid gap-4 lg:grid-cols-2">
                <div class="space-y-3">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Link Telegram</label>
                    <div class="flex mt-1"><input id="linkTelegram" readonly class="flex-grow bg-white/5 border border-white/10 rounded-l-xl px-3 py-2.5 text-xs font-mono text-slate-300" onclick="this.select()"><button onclick="copyLink('linkTelegram')" class="bg-violet-600 text-white px-4 rounded-r-xl text-xs hover:bg-violet-500"><i class="fa-solid fa-copy"></i></button></div></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Landing Page Toko</label>
                    <div class="flex mt-1"><input id="linkWebsite" readonly class="flex-grow bg-white/5 border border-white/10 rounded-l-xl px-3 py-2.5 text-xs font-mono text-slate-300" onclick="this.select()"><button onclick="copyLink('linkWebsite')" class="bg-violet-600 text-white px-4 rounded-r-xl text-xs hover:bg-violet-500"><i class="fa-solid fa-copy"></i></button></div></div>
                </div>
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-5 text-sm space-y-3">
                    <div><span class="text-slate-400 uppercase text-[10px] tracking-widest">Komisi Affiliate</span><p class="font-black text-white text-xl">${dashData.data?.commissionPercent || 20}% dari profit</p></div>
                    <div><span class="text-slate-400 uppercase text-[10px] tracking-widest">Minimal Withdraw</span><p class="font-black text-white text-lg">Rp ${(dashData.data?.minWithdraw || 10000).toLocaleString('id-ID')}</p></div>
                    <div><span class="text-slate-400 uppercase text-[10px] tracking-widest">Total Downline</span><p class="font-black text-white text-lg">${dashData.data?.totalDownline || 0}</p></div>
                    <div class="bg-violet-500/10 border border-violet-500/20 rounded-2xl p-3 text-[11px] text-violet-200">Bagikan link di atas. Setiap pendaftaran dan transaksi downline akan tercatat otomatis di dashboard Anda.</div>
                </div>
            </div>
        </div>`;
        document.getElementById('linkTelegram').value = dashData.data?.linkTelegram || '';
        document.getElementById('linkWebsite').value = dashData.data?.linkWebsite || '';
    } else if (tab === 'tampilan') {
        const sl = currentProfile.socialLinks || {};
        const colors = ['#7c3aed','#2563eb','#059669','#dc2626','#d97706','#ec4899','#0891b2','#4f46e5'];
        c.innerHTML = `<div class="glass p-5 glow-card fade-up">
            <h3 class="font-bold text-white mb-4"><i class="fa-solid fa-palette text-pink-400 mr-2"></i>Tampilan Toko</h3>
            <p class="text-xs text-slate-400 mb-4">Kustomisasi halaman toko affiliate Anda dengan tampilan profesional.</p>

            <div class="grid gap-6 lg:grid-cols-[2fr_1.2fr]">
                <div class="space-y-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">URL Avatar / Foto Profil</label>
                    <input type="text" id="inp-avatar" value="${currentProfile.avatar||''}" placeholder="https://example.com/foto.jpg" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white mt-1 outline-none focus:border-violet-500">
                    <p class="text-[10px] text-slate-500 mt-1">Upload foto ke penyedia hosting gambar lalu paste linknya di sini.</p></div>

                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Warna Tema</label>
                    <div class="flex gap-2 mt-2 flex-wrap">${colors.map(cl => `<button onclick="document.getElementById('inp-color').value='${cl}';document.querySelectorAll('.clr-btn').forEach(b=>b.classList.remove('ring-2'));this.classList.add('ring-2')" class="clr-btn w-8 h-8 rounded-full hover:scale-110 transition ${(currentProfile.themeColor||'#7c3aed')===cl?'ring-2 ring-white ring-offset-2 ring-offset-slate-900':''}" style="background:${cl}"></button>`).join('')}</div>
                    <input type="text" id="inp-color" value="${currentProfile.themeColor||'#7c3aed'}" placeholder="#7c3aed" class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white mt-2 outline-none focus:border-violet-500"></div>

                    <div class="border-t border-white/5 pt-4"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Link Sosial Media</label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div class="flex items-center gap-2"><i class="fa-brands fa-instagram text-pink-400 w-5"></i><input type="text" id="sl-instagram" value="${sl.instagram||''}" placeholder="username" class="flex-grow bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs text-white outline-none"></div>
                        <div class="flex items-center gap-2"><i class="fa-brands fa-tiktok text-white w-5"></i><input type="text" id="sl-tiktok" value="${sl.tiktok||''}" placeholder="username" class="flex-grow bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs text-white outline-none"></div>
                        <div class="flex items-center gap-2"><i class="fa-brands fa-whatsapp text-emerald-400 w-5"></i><input type="text" id="sl-whatsapp" value="${sl.whatsapp||''}" placeholder="628xxx" class="flex-grow bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs text-white outline-none"></div>
                        <div class="flex items-center gap-2"><i class="fa-brands fa-youtube text-red-400 w-5"></i><input type="text" id="sl-youtube" value="${sl.youtube||''}" placeholder="channel" class="flex-grow bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs text-white outline-none"></div>
                        <div class="flex items-center gap-2"><i class="fa-brands fa-telegram text-sky-400 w-5"></i><input type="text" id="sl-telegram" value="${sl.telegram||''}" placeholder="username" class="flex-grow bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs text-white outline-none"></div>
                        <div class="flex items-center gap-2"><i class="fa-solid fa-bag-shopping text-orange-400 w-5"></i><input type="text" id="sl-shopee" value="${sl.shopee||''}" placeholder="link shopee" class="flex-grow bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-xs text-white outline-none"></div>
                    </div></div>
                </div>
                <div class="glass p-5 rounded-3xl border border-white/10">
                    <h4 class="font-bold text-white mb-3">Pratinjau Toko</h4>
                    <div class="rounded-3xl overflow-hidden border border-white/10" style="background:${currentProfile.themeColor || '#7c3aed'}1a;">
                        <div class="p-4 bg-slate-950/90">
                            <div class="flex items-center gap-3">
                                <div class="w-16 h-16 rounded-3xl bg-white/10 overflow-hidden flex items-center justify-center"><img src="${currentProfile.avatar||'https://placehold.co/80x80/7c3aed/ffffff?text=Avatar'}" alt="Avatar" class="w-full h-full object-cover"></div>
                                <div>
                                    <p class="text-sm font-black text-white">${currentProfile.affiliateName || currentProfile.name}</p>
                                    <p class="text-[11px] text-slate-300">${currentProfile.bio || 'Toko affiliate keren dengan tampilan modern.'}</p>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 space-y-3">
                            <div class="rounded-2xl bg-slate-900/80 p-3 border border-white/10">
                                <p class="text-[11px] uppercase tracking-widest text-slate-500">Link Toko</p>
                                <p class="text-sm text-white break-all">${dashData.data?.linkWebsite}</p>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                ${Object.entries(sl).map(([key,val]) => `<div class="rounded-2xl bg-slate-900/80 p-3 border border-white/10 text-[10px] text-slate-300">${key.toUpperCase()}:<br><span class="text-white break-all">${val}</span></div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-5 flex-col sm:flex-row">
                <button onclick="saveTampilan()" class="bg-gradient-to-r from-violet-600 to-purple-600 text-white font-bold px-6 py-3 rounded-xl text-sm hover:shadow-lg transition flex-grow">Simpan Tampilan</button>
                <a href="/toko/${currentProfile.randomId}" target="_blank" class="bg-white/5 border border-white/10 text-white font-bold px-5 py-3 rounded-xl text-sm hover:bg-white/10 transition flex-grow text-center"><i class="fa-solid fa-eye mr-1"></i>Preview</a>
            </div>
        </div>`;
    } else if (tab === 'settings') {
        c.innerHTML = `<div class="glass p-5 glow-card fade-up">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                <div>
                    <h3 class="font-bold text-white mb-2"><i class="fa-solid fa-cog text-violet-400 mr-2"></i>Pengaturan Toko</h3>
                    <p class="text-xs text-slate-400">Pilih produk, atur markup, dan tampilkan toko affiliate Anda hanya dengan beberapa klik.</p>
                </div>
                <div class="inline-flex gap-2 flex-wrap">
                    <button onclick="selectAllProducts()" class="text-xs font-bold px-4 py-2 rounded-full bg-white/10 border border-white/10 text-white hover:bg-white/15">Pilih Semua</button>
                    <button onclick="clearSelectedProducts()" class="text-xs font-bold px-4 py-2 rounded-full bg-slate-800 border border-white/10 text-slate-200 hover:bg-slate-700">Bersihkan</button>
                </div>
            </div>
            <div class="grid grid-cols-1 xl:grid-cols-[1fr_320px] gap-4 mt-4">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Markup Harga (%)</label>
                        <input type="range" id="markupSlider" min="0" max="100" value="${dashData.data?.markupPercent||0}" oninput="document.getElementById('markupVal').innerText=this.value+'%'" class="w-full mt-2 accent-violet-500">
                        <p class="text-sm text-center font-bold text-violet-400 mt-1"><span id="markupVal">${dashData.data?.markupPercent||0}%</span></p>
                    </div>
                    <div class="bg-slate-900 border border-white/10 rounded-3xl p-4 space-y-3">
                        <div class="flex items-center justify-between gap-2">
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-slate-500">Produk Dipilih</p>
                                <p id="selectedCount" class="font-black text-white text-lg">0 produk</p>
                            </div>
                            <span class="text-[10px] py-1 px-3 rounded-full bg-violet-500/10 text-violet-300">PPOB, TopUp, Akun</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-[10px] text-slate-400">
                            <div class="bg-white/5 rounded-2xl p-3"><p class="font-bold text-white">Link Toko</p><p class="mt-1 text-slate-300 truncate">${dashData.data?.linkWebsite}</p></div>
                            <div class="bg-white/5 rounded-2xl p-3"><p class="font-bold text-white">Downline</p><p class="mt-1 text-slate-300">${dashData.data?.totalDownline || 0} orang</p></div>
                            <div class="bg-white/5 rounded-2xl p-3"><p class="font-bold text-white">Komisi Bulan Ini</p><p class="mt-1 text-slate-300">Rp ${(dashData.data?.monthlyCommission||0).toLocaleString('id-ID')}</p></div>
                        </div>
                    </div>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cari Produk</label>
                        <input id="productSearch" oninput="filterAffiliateProducts()" type="text" placeholder="Cari nama produk..." class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-xs text-white outline-none focus:border-violet-500">
                    </div>
                    <div class="flex flex-wrap gap-2" id="categoryFilters"></div>
                </div>
            </div>
            <div class="mt-4 bg-white/5 border border-white/10 rounded-3xl p-4">
                <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
                    <div class="space-y-1"><p class="text-[10px] uppercase tracking-widest text-slate-400">Total Produk</p><p id="totalProducts" class="font-black text-white">-</p></div>
                    <div class="space-y-1"><p class="text-[10px] uppercase tracking-widest text-slate-400">Kategori Aktif</p><p id="currentCategoryLabel" class="font-black text-white">Semua</p></div>
                    <div class="space-y-1"><p class="text-[10px] uppercase tracking-widest text-slate-400">Pilih untuk Toko</p><p id="selectedSummary" class="font-black text-white">-</p></div>
                </div>
            </div>
            <div id="productCBs" class="max-h-[42rem] overflow-y-auto mt-4 grid gap-3"></div>
            <button onclick="saveSettings()" class="mt-4 w-full bg-gradient-to-r from-violet-600 to-purple-600 text-white font-bold px-6 py-3 rounded-xl text-sm hover:shadow-lg hover:shadow-violet-500/20 transition">Simpan Pengaturan</button>
        </div>`;
        loadProductCheckboxes();
    } else if (tab === 'downline') {
        const dl = dashData.downlines || [];
        c.innerHTML = `<div class="glass p-5 glow-card fade-up">
            <h3 class="font-bold text-white mb-4"><i class="fa-solid fa-users text-sky-400 mr-2"></i>Downline (${dashData.data?.totalDownline||0})</h3>
            ${dl.length === 0 ? '<p class="text-slate-500 text-sm text-center py-6">Belum ada downline. Bagikan link affiliate Anda!</p>' :
            `<div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="text-slate-400 border-b border-white/5"><th class="px-3 py-2 text-left">Nama</th><th class="px-3 py-2">ID</th><th class="px-3 py-2">Order</th><th class="px-3 py-2">Gabung</th></tr></thead><tbody>${dl.map(d=>`<tr class="border-b border-white/5"><td class="px-3 py-2.5 font-bold text-white">${d.name}</td><td class="px-3 py-2.5 text-center"><code class="text-violet-300">${d.randomId}</code></td><td class="px-3 py-2.5 text-center font-bold ${d.totalOrder>0?'text-emerald-400':'text-slate-500'}">${d.totalOrder}x</td><td class="px-3 py-2.5 text-center text-slate-400">${new Date(d.joinedAt).toLocaleDateString('id-ID')}</td></tr>`).join('')}</tbody></table></div>`}
        </div>`;
    } else if (tab === 'history') {
        const h = dashData.history || [];
        c.innerHTML = `<div class="glass p-5 glow-card fade-up">
            <h3 class="font-bold text-white mb-4"><i class="fa-solid fa-clock-rotate-left text-amber-400 mr-2"></i>Riwayat Komisi</h3>
            ${h.length === 0 ? '<p class="text-slate-500 text-sm text-center py-6">Belum ada komisi. Ajak teman bergabung!</p>' :
            `<div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="text-slate-400 border-b border-white/5"><th class="px-3 py-2 text-left">Produk</th><th class="px-3 py-2">Pembeli</th><th class="px-3 py-2 text-right">Komisi</th><th class="px-3 py-2">Tanggal</th></tr></thead><tbody>${h.map(r=>`<tr class="border-b border-white/5"><td class="px-3 py-2.5 font-bold text-white max-w-[180px] truncate">${r.product}</td><td class="px-3 py-2.5 text-center text-slate-400">${r.buyerName||'-'}</td><td class="px-3 py-2.5 text-right font-bold text-emerald-400">+Rp ${(r.commission||0).toLocaleString('id-ID')}</td><td class="px-3 py-2.5 text-center text-slate-400 text-[10px]">${new Date(r.date).toLocaleDateString('id-ID')}</td></tr>`).join('')}</tbody></table></div>`}
        </div>`;
    } else if (tab === 'withdraw') {
        const wh = dashData.withdrawHistory || [];
        c.innerHTML = `<div class="glass p-5 glow-card fade-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-white"><i class="fa-solid fa-money-bill-transfer text-emerald-400 mr-2"></i>Withdraw</h3>
                <button onclick="tarikKomisi()" class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold px-5 py-2 rounded-xl text-xs hover:shadow-lg transition">Tarik Komisi</button>
            </div>
            <p class="text-xs text-slate-400 mb-4">Minimal penarikan: <strong class="text-white">Rp ${(dashData.data?.minWithdraw||10000).toLocaleString('id-ID')}</strong></p>
            ${wh.length === 0 ? '<p class="text-slate-500 text-sm text-center py-4">Belum ada riwayat penarikan.</p>' :
            `<div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="text-slate-400 border-b border-white/5"><th class="px-3 py-2">ID</th><th class="px-3 py-2">Jumlah</th><th class="px-3 py-2">Tujuan</th><th class="px-3 py-2">Status</th></tr></thead><tbody>${wh.map(w=>`<tr class="border-b border-white/5"><td class="px-3 py-2.5 font-mono text-[10px] text-slate-400">${w.id}</td><td class="px-3 py-2.5 font-bold text-white">Rp ${(w.amount||0).toLocaleString('id-ID')}</td><td class="px-3 py-2.5 text-slate-400">${w.bankDetails||'-'}</td><td class="px-3 py-2.5 text-center"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${w.status==='SUKSES'?'bg-emerald-500/20 text-emerald-400':w.status==='PENDING'?'bg-amber-500/20 text-amber-400':'bg-red-500/20 text-red-400'}">${w.status}</span></td></tr>`).join('')}</tbody></table></div>`}
        </div>`;
    }
}

async function loginAffiliate() {
    const rid = document.getElementById('inputRandomId').value.trim().toUpperCase();
    if (!rid) return Swal.fire('Oops', 'Masukkan Random ID', 'warning');
    try {
        const r = await fetch('/api/affiliate/dashboard', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({randomId:rid}) });
        const d = await r.json();
        if (d.success) {
            localStorage.setItem('affId', rid);
            dashData = d;
            currentProfile = d.data;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            document.getElementById('headerName').classList.remove('hidden');
            populateDashboard(d);
        } else if (d.isPending) {
            Swal.fire({icon:'info', title:'Menunggu Persetujuan', text:d.message, confirmButtonColor:'#7c3aed'});
        } else {
            Swal.fire('Gagal', d.message || 'Akun tidak ditemukan.', 'error');
        }
    } catch(e) { Swal.fire('Error', 'Gagal terhubung ke server.', 'error'); }
}

function populateDashboard(d) {
    document.getElementById('affName').innerText = d.data.affiliateName || d.data.name;
    document.getElementById('affCode').innerText = d.data.randomId;
    document.getElementById('affBio').innerText = d.data.bio || '';
    document.getElementById('saldoKomisi').innerText = 'Rp ' + (d.data.affiliateBalance||0).toLocaleString('id-ID');
    document.getElementById('headerName').innerText = d.data.affiliateName || d.data.name;
    const stats = [
        { label:'Total Downline', value:d.data.totalDownline||0, icon:'fa-users', bg:'from-sky-600/20 to-blue-600/20', color:'text-sky-400' },
        { label:'Downline Aktif', value:d.data.activeDownline||0, icon:'fa-user-check', bg:'from-emerald-600/20 to-teal-600/20', color:'text-emerald-400' },
        { label:'Komisi Bulan Ini', value:'Rp '+(d.data.monthlyCommission||0).toLocaleString('id-ID'), icon:'fa-calendar', bg:'from-amber-600/20 to-orange-600/20', color:'text-amber-400' },
        { label:'Total Komisi', value:'Rp '+(d.data.totalCommission||0).toLocaleString('id-ID'), icon:'fa-chart-line', bg:'from-violet-600/20 to-purple-600/20', color:'text-violet-400' }
    ];
    document.getElementById('statsGrid').innerHTML = stats.map(s => `<div class="glass glow-card p-4 fade-up">
        <div class="stat-icon bg-gradient-to-br ${s.bg} mb-2"><i class="fa-solid ${s.icon} ${s.color} text-sm"></i></div>
        <p class="text-[10px] text-slate-400 font-bold uppercase">${s.label}</p>
        <h3 class="text-lg font-black text-white mt-0.5">${s.value}</h3>
    </div>`).join('');

    const actions = [
        { label: 'Lihat Link Telegram', icon: 'fa-paperclip', action: "switchDashTab('links')" },
        { label: 'Lihat Link Website', icon: 'fa-globe', action: "switchDashTab('links')" },
        { label: 'Edit Profil', icon: 'fa-user-edit', action: 'editProfile()' },
        { label: 'Edit Tampilan', icon: 'fa-paintbrush', action: "switchDashTab('tampilan')" },
        { label: 'Pilih Produk', icon: 'fa-box-open', action: "switchDashTab('settings')" },
        { label: 'Tarik Komisi', icon: 'fa-money-bill-transfer', action: 'tarikKomisi()' },
        { label: 'Lihat Downline', icon: 'fa-users', action: "switchDashTab('downline')" },
        { label: 'Riwayat Komisi', icon: 'fa-clock-rotate-left', action: "switchDashTab('history')" },
        { label: 'Preview Toko', icon: 'fa-eye', action: `window.open('/toko/${d.data.randomId}', '_blank')` },
        { label: 'Lihat Pengaturan', icon: 'fa-gear', action: "switchDashTab('settings')" }
    ];
    document.getElementById('actionGrid').innerHTML = actions.map(a => `<button onclick="${a.action}" class="glass glow-card p-4 text-left transition hover:-translate-y-1 hover:border-violet-500/40 border border-white/10 rounded-3xl"><div class="flex items-center gap-3 mb-3"><span class="w-11 h-11 rounded-2xl bg-violet-500/10 text-violet-300 flex items-center justify-center"><i class="fa-solid ${a.icon}"></i></span><div><p class="text-xs uppercase tracking-widest text-slate-400">Aksi</p><p class="font-bold text-white">${a.label}</p></div></div></button>`).join('');
    switchDashTab('links');
}

async function loadProductCheckboxes() {
    try {
        const r = await fetch('/api/mixed-products'); const d = await r.json();
        if (d.products) {
            affiliateProducts = d.products.map(p => ({
                ...p,
                label: `${p.name} (${p.source === 'ppob' ? 'PPOB' : p.source === 'topup' ? 'Top Up' : 'Akun'})`
            }));
            currentProductCategory = 'all';
            productSearchTerm = '';
            renderProductSelection();
            renderCategoryFilters();
        }
    } catch(e) { console.error(e); }
}

function renderCategoryFilters() {
    const categories = ['all','premku','ppob','topup'];
    document.getElementById('categoryFilters').innerHTML = categories.map(cat => {
        const label = cat === 'all' ? 'Semua' : cat === 'premku' ? 'Akun' : cat === 'ppob' ? 'PPOB' : 'Top Up';
        return `<button class="text-[10px] font-bold px-4 py-2 rounded-full ${currentProductCategory === cat ? 'bg-violet-600 text-white' : 'bg-white/5 text-slate-300 border border-white/10'}" onclick="setAffiliateCategory('${cat}')">${label}</button>`;
    }).join('');
}

function setAffiliateCategory(category) {
    currentProductCategory = category;
    renderCategoryFilters();
    renderProductSelection();
}

function filterAffiliateProducts() {
    productSearchTerm = document.getElementById('productSearch').value.trim().toLowerCase();
    renderProductSelection();
}

function renderProductSelection() {
    const sel = dashData.data?.selectedProducts || [];
    const filtered = affiliateProducts.filter(p => {
        const matchCategory = currentProductCategory === 'all' || p.source === currentProductCategory;
        const matchSearch = !productSearchTerm || p.label.toLowerCase().includes(productSearchTerm);
        return matchCategory && matchSearch;
    });
    const total = filtered.length;
    const selected = affiliateProducts.filter(p => sel.includes(p.id)).length;
    document.getElementById('totalProducts').innerText = `${total} produk cocok`;
    document.getElementById('selectedCount').innerText = `${selected} dipilih`;
    document.getElementById('currentCategoryLabel').innerText = currentProductCategory === 'all' ? 'Semua' : currentProductCategory === 'premku' ? 'Akun' : currentProductCategory === 'ppob' ? 'PPOB' : 'Top Up';
    document.getElementById('selectedSummary').innerText = sel.length ? `${sel.length} produk` : 'Belum ada';
    document.getElementById('productCBs').innerHTML = filtered.map(p => `<label class="flex items-center gap-3 p-3 rounded-3xl bg-slate-900 border border-white/10 cursor-pointer hover:border-violet-500"><input type="checkbox" value="${p.id}" ${sel.includes(p.id) ? 'checked' : ''} class="product-cb accent-violet-500"><div class="flex-1 text-xs text-slate-300"><span class="font-bold text-white">${p.name}</span><br><span class="text-[10px] text-slate-500">${p.source.toUpperCase()} • Rp ${p.price.toLocaleString('id-ID')}</span></div></label>`).join('');
}

function selectAllProducts() {
    const sel = affiliateProducts.map(p => p.id);
    dashData.data.selectedProducts = sel;
    renderProductSelection();
}

function clearSelectedProducts() {
    dashData.data.selectedProducts = [];
    renderProductSelection();
}

async function editProfile() {
    const { value } = await Swal.fire({ title:'Edit Profil Toko', background:'#0f172a', color:'#e2e8f0',
        html:`<div class="text-left"><label class="block text-xs font-bold text-slate-400 mb-1">Nama Toko</label><input id="swal-name" class="swal2-input" style="background:#1e293b;color:white;border-color:#334155" value="${currentProfile.affiliateName||''}"><label class="block text-xs font-bold text-slate-400 mb-1 mt-3">Bio</label><textarea id="swal-bio" class="swal2-textarea" style="background:#1e293b;color:white;border-color:#334155;height:80px">${currentProfile.bio||''}</textarea></div>`,
        showCancelButton:true, confirmButtonText:'Simpan', confirmButtonColor:'#7c3aed', cancelButtonText:'Batal',
        preConfirm:()=>({name:document.getElementById('swal-name').value.trim(),bio:document.getElementById('swal-bio').value.trim()})
    });
    if (value) {
        const r = await fetch('/api/affiliate/settings', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({randomId:currentProfile.randomId,affiliateName:value.name,bio:value.bio})});
        const d = await r.json();
        if(d.success){ Swal.fire({icon:'success',title:'Berhasil',text:'Profil diperbarui.',background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'}); loginAffiliate(); }
        else Swal.fire('Gagal',d.message,'error');
    }
}

async function saveTampilan() {
    const avatarUrl = document.getElementById('inp-avatar')?.value.trim() || '';
    const themeColor = document.getElementById('inp-color')?.value.trim() || '#7c3aed';
    const socialLinks = {
        instagram: document.getElementById('sl-instagram')?.value.trim() || '',
        tiktok: document.getElementById('sl-tiktok')?.value.trim() || '',
        whatsapp: document.getElementById('sl-whatsapp')?.value.trim() || '',
        youtube: document.getElementById('sl-youtube')?.value.trim() || '',
        telegram: document.getElementById('sl-telegram')?.value.trim() || '',
        shopee: document.getElementById('sl-shopee')?.value.trim() || ''
    };
    // Remove empty ones
    Object.keys(socialLinks).forEach(k => { if (!socialLinks[k]) delete socialLinks[k]; });
    const r = await fetch('/api/affiliate/settings', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ randomId: currentProfile.randomId, avatarUrl, themeColor, socialLinks })
    });
    const d = await r.json();
    if(d.success){
        Swal.fire({icon:'success',title:'Tampilan Disimpan!',text:'Cek preview toko Anda.',background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'});
        loginAffiliate();
    } else Swal.fire({icon:'error',title:'Gagal',text:d.message,background:'#0f172a',color:'#e2e8f0'});
}

async function saveSettings() {
    const markup = parseInt(document.getElementById('markupSlider').value);
    const sel = Array.from(document.querySelectorAll('.product-cb:checked')).map(cb=>cb.value);
    const r = await fetch('/api/affiliate/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({randomId:currentProfile.randomId,markupPercent:markup,selectedProducts:sel})});
    const d = await r.json();
    if(d.success){ Swal.fire({icon:'success',title:'Tersimpan',text:'Pengaturan toko disimpan.',background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'}); loginAffiliate(); }
    else Swal.fire('Gagal',d.message,'error');
}

async function tarikKomisi() {
    const { value } = await Swal.fire({ title:'Tarik Komisi', background:'#0f172a', color:'#e2e8f0',
        html:`<p class="text-xs text-slate-400 mb-3">Saldo: <strong class="text-emerald-400">Rp ${(currentProfile.affiliateBalance||0).toLocaleString('id-ID')}</strong></p>
        <input id="swal-amount" type="number" class="swal2-input" style="background:#1e293b;color:white;border-color:#334155" placeholder="Nominal (min Rp 10.000)">
        <input id="swal-bank" class="swal2-input" style="background:#1e293b;color:white;border-color:#334155" placeholder="Bank/E-Wallet + Nomor (cth: DANA 0812xxx)">`,
        showCancelButton:true, confirmButtonText:'Ajukan', confirmButtonColor:'#059669', cancelButtonText:'Batal',
        preConfirm:()=>{ const a=document.getElementById('swal-amount').value,b=document.getElementById('swal-bank').value; if(!a||!b){Swal.showValidationMessage('Semua kolom wajib diisi!');return false;} return {amount:parseInt(a),bankDetails:b}; }
    });
    if(value) {
        const r = await fetch('/api/affiliate/withdraw',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({randomId:currentProfile.randomId,amount:value.amount,bankDetails:value.bankDetails})});
        const d = await r.json();
        if(d.success){ Swal.fire({icon:'success',title:'Berhasil',text:d.message,background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'}); loginAffiliate(); }
        else Swal.fire({icon:'error',title:'Gagal',text:d.message,background:'#0f172a',color:'#e2e8f0'});
    }
}

function copyLink(id) { const el=document.getElementById(id); el.select(); document.execCommand('copy'); Swal.fire({toast:true,position:'top',icon:'success',title:'Link disalin!',showConfirmButton:false,timer:1500,background:'#0f172a',color:'#e2e8f0'}); }
function logoutAffiliate() { localStorage.removeItem('affId'); location.reload(); }

window.onload = () => { const s = localStorage.getItem('affId'); if(s){ document.getElementById('inputRandomId').value=s; loginAffiliate(); } };
</script>
