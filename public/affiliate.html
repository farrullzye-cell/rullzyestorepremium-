<script>
let fbAuth = null;
let fbReady = false;
let currentPendingGoogle = null;

(async function initFirebase() {
    try {
        const r = await fetch('/api/firebase-config');
        const d = await r.json();
        if (d.success && d.config && d.config.apiKey && d.config.projectId) {
            firebase.initializeApp(d.config);
            fbAuth = firebase.auth();
            fbAuth.useDeviceLanguage();
            fbReady = true;
        }
    } catch(e) { console.warn('Firebase init:', e.message); }
})();

window.googleLogin = function() {
    if (!fbReady) {
        Swal.fire({icon:'error', title:'Google Login Belum Siap', text:'Firebase belum dikonfigurasi. Admin harus mengisi Firebase Config di Panel Admin terlebih dahulu.', background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
        return;
    }
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');
    fbAuth.signInWithPopup(provider).then(async (result) => {
        // Dapatkan token
        const credential = firebase.auth.GoogleAuthProvider.credentialFromResult(result);
        const firebaseIdToken = await result.user.getIdToken(); // Firebase ID token (selalu valid)
        const accessToken = credential?.accessToken; // Google access token
        const email = result.user.email;
        const name = result.user.displayName;

        currentPendingGoogle = { idToken: firebaseIdToken, accessToken, email, name };

        const r2 = await fetch('/api/affiliate/google-login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ idToken: firebaseIdToken, accessToken })
        });
        const d = await r2.json();
        if (!d.success) {
            Swal.fire({icon:'error', title:'Gagal', text:d.message, background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
            return;
        }
        if (d.linked) {
            setToken(d.token);
            loadDashboard();
            Swal.fire({icon:'success', title:'Berhasil Masuk!', text:'Selamat datang kembali!', background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed', timer:1500, showConfirmButton:false});
        } else {
            document.getElementById('linkGoogleEmail').textContent = d.googleEmail;
            document.getElementById('linkGoogleModal').style.display = 'flex';
        }
    }).catch((err) => {
        if (err.code !== 'auth/popup-closed-by-user') {
            Swal.fire({icon:'error', title:'Gagal Login', text:err.message, background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
        }
    });
};

window.confirmLinkGoogle = async function() {
    const randomId = document.getElementById('linkRandomId').value.trim().toUpperCase();
    if (!randomId) return Swal.fire({icon:'warning', title:'Oops', text:'Masukkan Random ID', background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
    if (!currentPendingGoogle) return;
    const r = await fetch('/api/affiliate/link-google', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ idToken: currentPendingGoogle.idToken, accessToken: currentPendingGoogle.accessToken, randomId })
    });
    const d = await r.json();
    if (d.success) {
        setToken(d.token);
        document.getElementById('linkGoogleModal').style.display = 'none';
        loadDashboard();
        Swal.fire({icon:'success', title:'Tertaut!', text:'Akun Google berhasil dihubungkan!', background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed', timer:1500, showConfirmButton:false});
    } else {
        Swal.fire({icon:'error', title:'Gagal', text:d.message, background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
    }
};

let currentProfile = {};

// ================= TOKEN MANAGEMENT =================
function getToken() { return localStorage.getItem('affToken'); }
function setToken(t) { localStorage.setItem('affToken', t); }
function clearToken() { localStorage.removeItem('affToken'); localStorage.removeItem('affId'); }

function apiHeaders() {
    const h = { 'Content-Type': 'application/json' };
    const tok = getToken();
    if (tok) h['x-auth-token'] = tok;
    return h;
}

async function apiPost(url, body) {
    const r = await fetch(url, { method:'POST', headers: apiHeaders(), body: JSON.stringify(body) });
    const d = await r.json();
    // Auto logout if token invalid
    if (d.code === 'TOKEN_INVALID') {
        clearToken();
        showLogin();
        Swal.fire({icon:'info', title:'Sesi Habis', text:'Silakan login ulang.', background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
        return null;
    }
    return d;
}

    document.getElementById('loginSection').classList.remove('hidden');

}

// ================= LOGIN =================
async function loginAffiliate() {
    const rid = document.getElementById('inputRandomId').value.trim().toUpperCase();
    if (!rid) return Swal.fire({icon:'warning',title:'Oops',text:'Masukkan Random ID',background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'});
    try {
        // Step 1: Login dapat token
        const r = await fetch('/api/affiliate/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({randomId:rid}) });
        const d = await r.json();
        if (d.success) {
            setToken(d.token);
            localStorage.setItem('affId', rid);
            // Step 2: Fetch dashboard pakai token
            const dash = await apiPost('/api/affiliate/dashboard', {});
            if (!dash) return;
            if (dash.success) {
                dashData = dash;
                currentProfile = dash.data;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('btnLogout').classList.remove('hidden');
                document.getElementById('headerName').classList.remove('hidden');
                populateDashboard(dash);
            } else {
                clearToken();
                Swal.fire({icon:'error', title:'Gagal', text:dash.message, background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
            }
        } else if (d.isPending) {
            Swal.fire({icon:'info', title:'Menunggu Persetujuan', text:d.message, background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
        } else {
            Swal.fire({icon:'error', title:'Gagal', text:d.message || 'Akun tidak ditemukan.', background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
        }
    } catch(e) { Swal.fire({icon:'error', title:'Error', text:'Gagal terhubung ke server.', background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'}); }
}

function populateDashboard(d) {
    document.getElementById('affName').innerText = d.data.affiliateName || d.data.name;
    document.getElementById('affCode').innerText = d.data.randomId;
    document.getElementById('affBio').innerText = d.data.bio || '';
    document.getElementById('saldoKomisi').innerText = 'Rp ' + (d.data.affiliateBalance||0).toLocaleString('id-ID');
    document.getElementById('headerName').innerText = d.data.affiliateName || d.data.name;
    const stats = [
        { label:'Total Downline', value:d.data.totalDownline||0, icon:'fa-users', bg:'from-sky-600/20 to-blue-600/20', color:'text-sky-400' },
        { label:'Downline Aktif', value:d.data.activeDownline||0, icon:'fa-user-check', bg:'from-emerald-600/20 to-teal-600/20', color:'text-emerald-400' },
        { label:'Komisi Bulan Ini', value:'Rp '+(d.data.monthlyCommission||0).toLocaleString('id-ID'), icon:'fa-calendar', bg:'from-amber-600/20 to-orange-600/20', color:'text-amber-400' },
        { label:'Total Komisi', value:'Rp '+(d.data.totalCommission||0).toLocaleString('id-ID'), icon:'fa-chart-line', bg:'from-violet-600/20 to-purple-600/20', color:'text-violet-400' }
    ];
    document.getElementById('statsGrid').innerHTML = stats.map(s => `<div class="glass-card p-4 fade-up flex items-start gap-3">
        <div class="stat-icon bg-gradient-to-br ${s.bg} shrink-0"><i class="fa-solid ${s.icon} ${s.color} text-sm"></i></div>
        <div class="min-w-0">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${s.label}</p>
            <h3 class="text-lg font-black text-white mt-0.5">${s.value}</h3>
        </div>
    </div>`).join('');

    const actions = [
        { label: 'Link Telegram', icon: 'fa-paperclip', action: "switchDashTab('links')" },
        { label: 'Link Website', icon: 'fa-globe', action: "switchDashTab('links')" },
        { label: 'Edit Profil', icon: 'fa-user-edit', action: 'editProfile()' },
        { label: 'Edit Tampilan', icon: 'fa-paintbrush', action: "switchDashTab('tampilan')" },
        { label: 'Pilih Produk', icon: 'fa-box-open', action: "switchDashTab('settings')" },
        { label: 'Tarik Komisi', icon: 'fa-money-bill-transfer', action: 'tarikKomisi()' },
        { label: 'Lihat Downline', icon: 'fa-users', action: "switchDashTab('downline')" },
        { label: 'Riwayat Komisi', icon: 'fa-clock-rotate-left', action: "switchDashTab('history')" },
        { label: 'Preview Toko', icon: 'fa-eye', action: `window.open('/toko/${d.data.randomId}', '_blank')` },
        { label: 'Pengaturan', icon: 'fa-gear', action: "switchDashTab('settings')" }
    ];
    document.getElementById('actionGrid').innerHTML = actions.map(a => `<button onclick="${a.action}" class="glass-card p-3.5 text-left transition-all hover:-translate-y-0.5 hover:border-violet-500/25 border border-white/[0.06] rounded-2xl flex items-center gap-3"><span class="w-10 h-10 rounded-xl bg-violet-500/8 text-violet-300 flex items-center justify-center shrink-0"><i class="fa-solid ${a.icon} text-sm"></i></span><div class="min-w-0"><p class="text-[11px] font-bold text-white truncate">${a.label}</p></div></button>`).join('');
    switchDashTab('links');
}

async function loadProductCheckboxes() {
    try {
        const r = await fetch('/api/mixed-products'); const d = await r.json();
        if (d.products) {
            affiliateProducts = d.products.map(p => ({
                ...p,
                label: `${p.name} (${p.source === 'ppob' ? 'PPOB' : p.source === 'topup' ? 'Top Up' : 'Akun'})`
            }));
            currentProductCategory = 'all';
            productSearchTerm = '';
            renderProductSelection();
            renderCategoryFilters();
        }
    } catch(e) { console.error(e); }
}

function renderCategoryFilters() {
    const categories = ['all','premku','ppob','topup'];
    document.getElementById('categoryFilters').innerHTML = categories.map(cat => {
        const label = cat === 'all' ? 'Semua' : cat === 'premku' ? 'Akun' : cat === 'ppob' ? 'PPOB' : 'Top Up';
        return `<button class="text-[10px] font-bold px-4 py-2 rounded-full transition-all ${currentProductCategory === cat ? 'bg-violet-600 text-white shadow-lg shadow-violet-500/20' : 'bg-white/[0.04] text-slate-400 border border-white/[0.06] hover:bg-white/[0.08]'}" onclick="setAffiliateCategory('${cat}')">${label}</button>`;
    }).join('');
}

function setAffiliateCategory(category) {
    currentProductCategory = category;
    renderCategoryFilters();
    renderProductSelection();
}

function filterAffiliateProducts() {
    productSearchTerm = document.getElementById('productSearch').value.trim().toLowerCase();
    renderProductSelection();
}

function renderProductSelection() {
    const sel = dashData.data?.selectedProducts || [];
    const filtered = affiliateProducts.filter(p => {
        const matchCategory = currentProductCategory === 'all' || p.source === currentProductCategory;
        const matchSearch = !productSearchTerm || p.label.toLowerCase().includes(productSearchTerm);
        return matchCategory && matchSearch;
    });
    const total = filtered.length;
    const selected = affiliateProducts.filter(p => sel.includes(p.id)).length;
    document.getElementById('totalProducts').innerText = `${total} produk cocok`;
    document.getElementById('selectedCount').innerText = `${selected} dipilih`;
    document.getElementById('currentCategoryLabel').innerText = currentProductCategory === 'all' ? 'Semua' : currentProductCategory === 'premku' ? 'Akun' : currentProductCategory === 'ppob' ? 'PPOB' : 'Top Up';
    document.getElementById('selectedSummary').innerText = sel.length ? `${sel.length} produk` : 'Belum ada';
    document.getElementById('productCBs').innerHTML = filtered.map(p => `<label class="flex items-center gap-3 p-3.5 rounded-2xl bg-white/[0.02] border border-white/[0.06] cursor-pointer hover:border-violet-500/25 transition-all"><input type="checkbox" value="${p.id}" ${sel.includes(p.id) ? 'checked' : ''} class="product-cb accent-violet-500 w-4 h-4 shrink-0"><div class="flex-1 min-w-0"><span class="text-xs font-bold text-white">${p.name}</span><br><span class="text-[10px] text-slate-500">${p.source.toUpperCase()} • Rp ${p.price.toLocaleString('id-ID')}</span></div></label>`).join('');
}

function selectAllProducts() {
    const sel = affiliateProducts.map(p => p.id);
    dashData.data.selectedProducts = sel;
    renderProductSelection();
}

function clearSelectedProducts() {
    dashData.data.selectedProducts = [];
    renderProductSelection();
}

async function editProfile() {
    const { value } = await Swal.fire({
        title:'Edit Profil Toko',
        background:'#0f172a',
        color:'#e2e8f0',
        html:`<div class="text-left"><label class="block text-xs font-bold text-slate-400 mb-1.5">Nama Toko</label><input id="swal-name" class="swal2-input" style="background:#1e293b;color:white;border-color:#334155;width:100%;margin:0" value="${currentProfile.affiliateName||''}"><label class="block text-xs font-bold text-slate-400 mb-1.5 mt-4">Bio</label><textarea id="swal-bio" class="swal2-textarea" style="background:#1e293b;color:white;border-color:#334155;width:100%;margin:0;height:80px">${currentProfile.bio||''}</textarea></div>`,
        showCancelButton:true,
        confirmButtonText:'Simpan',
        confirmButtonColor:'#7c3aed',
        cancelButtonText:'Batal',
        cancelButtonColor:'#475569',
        preConfirm:()=>({name:document.getElementById('swal-name').value.trim(),bio:document.getElementById('swal-bio').value.trim()})
    });
    if (value) {
        const d = await apiPost('/api/affiliate/settings', {affiliateName:value.name,bio:value.bio});
        if(d && d.success){ Swal.fire({icon:'success',title:'Berhasil',text:'Profil diperbarui.',background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'}); loginAffiliate(); }
        else if(d) Swal.fire({icon:'error',title:'Gagal',text:d.message,background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'});
    }
}

async function saveTampilan() {
    const avatarUrl = document.getElementById('inp-avatar')?.value.trim() || '';
    const themeColor = document.getElementById('inp-color')?.value.trim() || '#7c3aed';
    const socialLinks = {
        instagram: document.getElementById('sl-instagram')?.value.trim() || '',
        tiktok: document.getElementById('sl-tiktok')?.value.trim() || '',
        whatsapp: document.getElementById('sl-whatsapp')?.value.trim() || '',
        youtube: document.getElementById('sl-youtube')?.value.trim() || '',
        telegram: document.getElementById('sl-telegram')?.value.trim() || '',
        shopee: document.getElementById('sl-shopee')?.value.trim() || ''
    };
    Object.keys(socialLinks).forEach(k => { if (!socialLinks[k]) delete socialLinks[k]; });
    const d = await apiPost('/api/affiliate/settings', { avatarUrl, themeColor, socialLinks });
    if(d && d.success){
        Swal.fire({icon:'success',title:'Tampilan Disimpan!',text:'Cek preview toko Anda.',background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'});
        loginAffiliate();
    } else if(d) Swal.fire({icon:'error',title:'Gagal',text:d.message,background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'});
}

async function saveSettings() {
    const markup = parseInt(document.getElementById('markupSlider').value);
    const sel = Array.from(document.querySelectorAll('.product-cb:checked')).map(cb=>cb.value);
    const d = await apiPost('/api/affiliate/settings', {markupPercent:markup,selectedProducts:sel});
    if(d && d.success){ Swal.fire({icon:'success',title:'Tersimpan',text:'Pengaturan toko disimpan.',background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'}); loginAffiliate(); }
    else if(d) Swal.fire({icon:'error',title:'Gagal',text:d.message,background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'});
}

async function tarikKomisi() {
    // Cek apakah sudah withdraw hari ini
    if (dashData.data?.wdToday >= 1) {
        return Swal.fire({icon:'warning', title:'Batas Harian', text:'Kamu sudah melakukan withdraw hari ini. Coba lagi besok!', background:'#0f172a', color:'#e2e8f0', confirmButtonColor:'#7c3aed'});
    }
    const { value } = await Swal.fire({
        title:'Tarik Komisi',
        background:'#0f172a',
        color:'#e2e8f0',
        html:`<p class="text-xs text-slate-400 mb-4">Saldo: <strong class="text-emerald-400">Rp ${(currentProfile.affiliateBalance||0).toLocaleString('id-ID')}</strong></p>
        <p class="text-[10px] text-amber-400/80 mb-3">Batas 1x withdraw per hari. Maks komisi per transaksi Rp 50.000.</p>
        <input id="swal-amount" type="number" class="swal2-input" style="background:#1e293b;color:white;border-color:#334155;width:100%;margin:0 0 10px" placeholder="Nominal (min Rp 10.000)">
        <input id="swal-bank" class="swal2-input" style="background:#1e293b;color:white;border-color:#334155;width:100%;margin:0" placeholder="Bank/E-Wallet + Nomor (cth: DANA 0812xxx)">`,
        showCancelButton:true,
        confirmButtonText:'Ajukan',
        confirmButtonColor:'#059669',
        cancelButtonText:'Batal',
        cancelButtonColor:'#475569',
        preConfirm:()=>{ const a=document.getElementById('swal-amount').value,b=document.getElementById('swal-bank').value; if(!a||!b){Swal.showValidationMessage('Semua kolom wajib diisi!');return false;} if(parseInt(a)<10000){Swal.showValidationMessage('Minimal Rp 10.000!');return false;} return {amount:parseInt(a),bankDetails:b}; }
    });
    if(value) {
        const d = await apiPost('/api/affiliate/withdraw', {amount:value.amount,bankDetails:value.bankDetails});
        if(d && d.success){ Swal.fire({icon:'success',title:'Berhasil',text:d.message,background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'}); loginAffiliate(); }
        else if(d) Swal.fire({icon:'error',title:'Gagal',text:d.message,background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed'});
    }
}

function copyLink(id) {
    const inp = document.getElementById(id); if (!inp) return;
    inp.select(); navigator.clipboard.writeText(inp.value).catch(()=>{});
    Swal.fire({icon:'success',title:'Tersalin!',text:'Link berhasil disalin.',background:'#0f172a',color:'#e2e8f0',confirmButtonColor:'#7c3aed',timer:1500,showConfirmButton:false});
}

async function logoutAffiliate() {
    // Revoke token di server
    await fetch('/api/affiliate/logout', { method:'POST', headers: apiHeaders() }).catch(()=>{});
    clearToken();
    showLogin();
}

// Auto login jika ada affToken di localStorage
document.addEventListener('DOMContentLoaded', async () => {
    const saved = getToken();
    const savedId = localStorage.getItem('affId');
    if (saved && savedId) {
        document.getElementById('inputRandomId').value = savedId;
        const dash = await apiPost('/api/affiliate/dashboard', {});
        if (dash && dash.success) {
            dashData = dash;
            currentProfile = dash.data;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            document.getElementById('headerName').classList.remove('hidden');
            populateDashboard(dash);
        } else {
            // Token expired or invalid
            clearToken();
        }
    }
});
</script>
