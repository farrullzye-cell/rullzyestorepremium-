<!DOCTYPE html>
<html lang="id-ID" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Top Up Game — RullzyeStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f7fb; color: #1e293b; }
        .game-card { transition: all 0.25s ease; cursor: pointer; }
        .game-card:hover { transform: translateY(-6px); box-shadow: 0 20px 35px rgba(0,0,0,0.08); }
        .nominal-btn { transition: all 0.2s; }
        .nominal-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; }
        .modal-pop { animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .tab-active { border-bottom: 3px solid #7c3aed; color: #7c3aed; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-14 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2">
                <div class="bg-violet-600 p-2 rounded-lg"><i class="fa-solid fa-gamepad text-white text-sm"></i></div>
                <span class="font-black text-lg text-slate-800">RullzyeStore</span>
            </a>
            <a href="/" class="text-xs font-bold text-slate-500 hover:text-violet-600 bg-slate-100 px-4 py-2 rounded-full"><i class="fa-solid fa-arrow-left mr-1"></i>Beranda</a>
        </div>
    </header>

    <!-- VIEW 1: Game List -->
    <div id="view-list">
        <!-- Hero -->
        <section class="bg-gradient-to-br from-violet-600 to-purple-700 text-white py-12 px-4 text-center">
            <h1 class="text-2xl sm:text-4xl font-black mb-2">Top Up Game Favoritmu</h1>
            <p class="text-violet-200 text-sm sm:text-base mb-6">Pilih game, masukkan ID, bayar — otomatis masuk!</p>
            <div class="max-w-md mx-auto relative">
                <input type="text" id="searchGame" placeholder="Cari game..." class="w-full py-3 pl-10 pr-4 rounded-xl text-slate-800 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-violet-300" oninput="filterGames()">
                <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>
        </section>

        <!-- Game Grid -->
        <main class="flex-grow max-w-7xl mx-auto px-4 py-8">
            <h2 class="text-lg font-black text-slate-800 mb-4">🎮 Semua Game</h2>
            <div id="game-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4"></div>
            <p id="no-game" class="text-center text-slate-400 py-10 hidden">Game tidak ditemukan.</p>
        </main>
    </div>

    <!-- VIEW 2: Game Detail + Order -->
    <div id="view-detail" class="hidden">
        <main class="flex-grow max-w-3xl mx-auto px-4 py-8">
            <!-- Back -->
            <button onclick="backToList()" class="text-sm font-bold text-violet-600 hover:text-violet-800 mb-4"><i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke daftar game</button>
            
            <!-- Game Info -->
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6">
                <div class="flex items-center gap-4 mb-4">
                    <div id="detail-icon" class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl"></div>
                    <div>
                        <h2 id="detail-title" class="text-xl font-black text-slate-800"></h2>
                        <p class="text-xs text-slate-500">Pilih nominal & isi data game</p>
                    </div>
                </div>

                <!-- Input ID Game -->
                <div class="mb-4">
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">User ID / UID <span class="text-red-500">*</span></label>
                    <input type="text" id="input-uid" placeholder="Contoh: 12345678" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
                </div>
                <!-- Zone ID (optional, muncul jika game butuh zone) -->
                <div id="zone-input" class="mb-4 hidden">
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Zone ID <span class="text-red-500">*</span></label>
                    <input type="text" id="input-zone" placeholder="Contoh: 1234" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
                </div>
                <!-- Random ID -->
                <div class="mb-4">
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Random ID Telegram <span class="text-red-500">*</span></label>
                    <input type="text" id="input-randomid" placeholder="ID-ABC123" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold text-sm uppercase focus:outline-none focus:ring-2 focus:ring-violet-500">
                    <p class="text-[10px] text-slate-400 mt-1"><i class="fa-solid fa-circle-info"></i> Belum punya? Ketik <b>/daftar</b> di <a href="https://t.me/RullzyeBot" target="_blank" class="text-violet-600 font-bold underline">Bot Telegram</a></p>
                </div>
            </div>

            <!-- Nominal Grid -->
            <h3 class="text-sm font-black text-slate-700 mb-3">💰 Pilih Nominal</h3>
            <div id="nominal-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6"></div>

            <!-- Buy Button -->
            <button id="btn-buy" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-4 rounded-2xl shadow-lg text-sm transition" onclick="submitOrder()">
                Beli Sekarang
            </button>
        </main>
    </div>

    <!-- Modal Pembayaran -->
    <div id="modal-pay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4" style="display:none;">
        <div class="bg-white rounded-[32px] w-full max-w-md p-8 shadow-2xl relative modal-pop">
            <button onclick="closePayModal()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center"><i class="fa-solid fa-xmark text-slate-400 text-sm"></i></button>
            <div id="pay-loader" class="text-center py-10">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-violet-500 border-t-transparent mb-4"></div>
                <p class="font-bold text-slate-800">Memproses Pesanan...</p>
            </div>
            <div id="pay-result" class="hidden text-center"></div>
        </div>
    </div>

    <script>
        let allProducts = [];
        let selectedGame = null;
        let selectedProduct = null;

        // Ambil produk dari Celestial
        fetch('/api/topup-products')
            .then(r => r.json())
            .then(res => {
                if (res.success && res.products) {
                    allProducts = res.products;
                    renderGameList(allProducts);
                } else {
                    document.getElementById('game-grid').innerHTML = '<p class="col-span-full text-center text-slate-400 py-10">Gagal memuat game.</p>';
                }
            });

        // ========== VIEW 1: Game List ==========
        function renderGameList(products) {
            // Group by game (ambil brand dari nama produk)
            const games = {};
            products.forEach(p => {
                const name = p.name || '';
                const dash = name.indexOf(' - ');
                const game = dash > -1 ? name.substring(0, dash).trim() : 'Other';
                if (!games[game]) games[game] = { name: game, products: [], icon: getGameIcon(game) };
                games[game].products.push(p);
            });

            const grid = document.getElementById('game-grid');
            grid.innerHTML = Object.values(games).map(g => `
                <div class="game-card bg-white rounded-2xl p-4 border border-slate-100 text-center" onclick="openGame('${g.name.replace(/'/g,"\\'")}')">
                    <div class="w-12 h-12 ${g.icon.bg} rounded-xl flex items-center justify-center mx-auto mb-2">
                        <i class="fa-solid ${g.icon.icon} ${g.icon.text} text-xl"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 text-xs">${g.name}</h3>
                    <p class="text-[10px] text-slate-400 mt-1">${g.products.length} item</p>
                </div>
            `).join('');
        }

        function filterGames() {
            const q = document.getElementById('searchGame').value.toLowerCase();
            const cards = document.querySelectorAll('.game-card');
            let found = false;
            cards.forEach(c => {
                const name = c.querySelector('h3').innerText.toLowerCase();
                if (q === '' || name.includes(q)) { c.style.display = ''; found = true; }
                else c.style.display = 'none';
            });
            document.getElementById('no-game').classList.toggle('hidden', found);
        }

        function getGameIcon(game) {
            const g = game.toLowerCase();
            if (g.includes('mobile legend') || g.includes('ml')) return { icon: 'fa-gamepad', bg: 'bg-blue-100', text: 'text-blue-600' };
            if (g.includes('free fire') || g.includes('ff')) return { icon: 'fa-fire', bg: 'bg-orange-100', text: 'text-orange-600' };
            if (g.includes('pubg')) return { icon: 'fa-person-rifle', bg: 'bg-yellow-100', text: 'text-yellow-600' };
            if (g.includes('cod') || g.includes('call of duty')) return { icon: 'fa-crosshairs', bg: 'bg-green-100', text: 'text-green-600' };
            if (g.includes('arena of valor') || g.includes('aov')) return { icon: 'fa-shield-haltered', bg: 'bg-red-100', text: 'text-red-600' };
            if (g.includes('honor of kings') || g.includes('hok')) return { icon: 'fa-crown', bg: 'bg-amber-100', text: 'text-amber-600' };
            if (g.includes('honkai') || g.includes('hsr')) return { icon: 'fa-star', bg: 'bg-indigo-100', text: 'text-indigo-600' };
            if (g.includes('genshin')) return { icon: 'fa-wind', bg: 'bg-sky-100', text: 'text-sky-600' };
            if (g.includes('valorant')) return { icon: 'fa-gun', bg: 'bg-rose-100', text: 'text-rose-600' };
            if (g.includes('magic chess')) return { icon: 'fa-chess-knight', bg: 'bg-purple-100', text: 'text-purple-600' };
            if (g.includes('delta force')) return { icon: 'fa-helicopter', bg: 'bg-slate-100', text: 'text-slate-600' };
            if (g.includes('identity v')) return { icon: 'fa-mask', bg: 'bg-gray-100', text: 'text-gray-600' };
            if (g.includes('fc mobile')) return { icon: 'fa-futbol', bg: 'bg-emerald-100', text: 'text-emerald-600' };
            if (g.includes('blood strike')) return { icon: 'fa-skull', bg: 'bg-zinc-100', text: 'text-zinc-600' };
            if (g.includes('au2')) return { icon: 'fa-dragon', bg: 'bg-teal-100', text: 'text-teal-600' };
            return { icon: 'fa-gamepad', bg: 'bg-violet-100', text: 'text-violet-600' };
        }

        // ========== VIEW 2: Game Detail ==========
        function openGame(gameName) {
            selectedGame = gameName;
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');

            const g = getGameIcon(gameName);
            document.getElementById('detail-icon').className = `w-14 h-14 rounded-2xl flex items-center justify-center text-2xl ${g.bg} ${g.text}`;
            document.getElementById('detail-icon').innerHTML = `<i class="fa-solid ${g.icon}"></i>`;
            document.getElementById('detail-title').innerText = gameName;

            // Filter produk game ini
            const products = allProducts.filter(p => {
                const name = p.name || '';
                const dash = name.indexOf(' - ');
                const game = dash > -1 ? name.substring(0, dash).trim() : 'Other';
                return game === gameName;
            });

            // Tampilkan nominal
            const needsZone = products.some(p => p.isZoneRequired);
            document.getElementById('zone-input').classList.toggle('hidden', !needsZone);

            const grid = document.getElementById('nominal-grid');
            selectedProduct = null;
            grid.innerHTML = products.map(p => {
                const name = p.name || '';
                const dash = name.indexOf(' - ');
                const itemName = dash > -1 ? name.substring(dash + 3).trim() : name;
                return `<button class="nominal-btn bg-slate-50 border border-slate-200 rounded-xl p-3 text-left hover:border-violet-300" onclick="selectNominal(this, '${p.id}','${itemName.replace(/'/g,"\\'")}',${p.price},${p.isZoneRequired})">
                    <p class="font-bold text-slate-800 text-xs">${itemName}</p>
                    <p class="text-xs text-violet-600 font-extrabold mt-1">Rp ${p.price.toLocaleString('id-ID')}</p>
                </button>`;
            }).join('');

            document.getElementById('input-uid').value = '';
            document.getElementById('input-zone').value = '';
            document.getElementById('input-randomid').value = '';
            window.scrollTo(0,0);
        }

        function selectNominal(btn, id, name, price, isZoneRequired) {
            document.querySelectorAll('.nominal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedProduct = { id, name, price, isZoneRequired };
        }

        function backToList() {
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
        }

        // ========== ORDER ==========
        function submitOrder() {
            if (!selectedProduct) return alert('Pilih nominal dulu!');
            const uid = document.getElementById('input-uid').value.trim();
            const zone = document.getElementById('input-zone').value.trim();
            const randomId = document.getElementById('input-randomid').value.trim().toUpperCase();

            if (!uid) return alert('Masukkan User ID!');
            if (selectedProduct.isZoneRequired && !zone) return alert('Masukkan Zone ID!');
            if (!randomId) return alert('Masukkan Random ID Telegram!');

            document.getElementById('modal-pay').style.display = 'flex';
            document.getElementById('pay-loader').classList.remove('hidden');
            document.getElementById('pay-result').classList.add('hidden');

            fetch('/api/topup-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    service: selectedProduct.id,
                    target: uid,
                    targetZone: zone || undefined,
                    productName: selectedProduct.name,
                    displayPrice: selectedProduct.price,
                    randomId: randomId,
                    nickname: uid
                })
            })
            .then(r => r.json())
            .then(res => {
                document.getElementById('pay-loader').classList.add('hidden');
                const r = document.getElementById('pay-result');
                r.classList.remove('hidden');

                if (res.status) {
                    r.innerHTML = `
                        <div class="text-emerald-500 text-3xl mb-3">✅</div>
                        <h3 class="text-lg font-black text-slate-800 mb-2">QRIS Siap!</h3>
                        <p class="text-sm text-slate-500 mb-4">Total: <b>Rp ${res.invoice.amount.toLocaleString('id-ID')}</b></p>
                        <img src="${res.invoice.qr_url}" class="w-40 h-40 mx-auto rounded-xl border-4 border-white shadow mb-4">
                        <a href="${res.invoice.botLink}" target="_blank" class="block w-full bg-violet-600 text-white font-bold py-3 rounded-xl text-sm mb-2"><i class="fa-brands fa-telegram mr-2"></i> Konfirmasi via Bot</a>
                        <button onclick="closePayModal()" class="text-slate-400 text-xs font-bold uppercase">Tutup</button>
                    `;
                } else {
                    r.innerHTML = `
                        <div class="text-red-500 text-3xl mb-3">❌</div>
                        <h3 class="text-lg font-black text-slate-800 mb-2">Gagal</h3>
                        <p class="text-sm text-slate-500 mb-4">${res.message || 'Gagal membuat pesanan'}</p>
                        <button onclick="closePayModal()" class="text-slate-400 text-xs font-bold uppercase">Tutup</button>
                    `;
                }
            })
            .catch(() => {
                document.getElementById('pay-loader').classList.add('hidden');
                const r = document.getElementById('pay-result');
                r.classList.remove('hidden');
                r.innerHTML = '<p class="text-slate-800 font-bold">Jaringan bermasalah.</p><button onclick="closePayModal()" class="text-slate-400 text-xs font-bold uppercase mt-3">Tutup</button>';
            });
        }

        function closePayModal() { document.getElementById('modal-pay').style.display = 'none'; }
        document.getElementById('modal-pay').addEventListener('click', function(e) { if (e.target === this) closePayModal(); });
    </script>
</body>
                </html>
