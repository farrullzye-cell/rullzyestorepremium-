    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #03050f; color: #e2e8f0; min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(139,92,246,0.04) 0%, transparent 50%),
            radial-gradient(circle at 90% 80%, rgba(99,102,241,0.05) 0%, transparent 50%); }
        .glass { background: rgba(15,23,42,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
        .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; }
        .game-card { transition: all 0.25s ease; cursor: pointer; background: rgba(15,23,42,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; }
        .game-card:hover { transform: translateY(-6px); box-shadow: 0 20px 35px rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.4); }
        .game-card:active { transform: scale(0.96); }
        .nominal-btn { transition: all 0.2s; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; border-radius: 14px; }
        .nominal-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; box-shadow: 0 0 20px rgba(124,58,237,0.25); }
        .nominal-btn:hover { border-color: rgba(124,58,237,0.5); }
        .modal-pop { animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 12px 16px; font-weight: 700; font-size: 14px; color: #fff; width: 100%; transition: border 0.2s; }
        .input-field:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
        .input-field::placeholder { color: #475569; }
        .btn-primary { background: #7c3aed; color: #fff; font-weight: 700; padding: 14px 0; border-radius: 16px; width: 100%; transition: all 0.2s; font-size: 14px; }
        .btn-primary:hover { background: #6d28d9; box-shadow: 0 8px 25px rgba(124,58,237,0.3); }
        .btn-primary:active { transform: scale(0.97); }
        .section-title { font-size: 13px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
        .label-input { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
        @media (max-width: 640px) {
            .game-card { padding: 12px 8px; }
            .glass-card { padding: 20px 16px; }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-[#03050f]/90 backdrop-blur-xl border-b border-white/5 fixed top-0 left-0 right-0 z-50 h-14">
        <div class="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
            <a href="/" class="flex items-center gap-2.5">
                <div class="bg-violet-600 p-2 rounded-xl"><i class="fa-solid fa-gamepad text-white text-sm"></i></div>
                <span class="font-black text-lg text-white">Rullzye<span class="text-violet-400">Store</span></span>
            </a>
            <button onclick="history.back()" class="text-xs font-bold text-slate-400 hover:text-violet-400 bg-white/5 border border-white/10 px-4 py-2 rounded-full transition"><i class="fa-solid fa-arrow-left mr-1.5"></i>Kembali</button>
        </div>
    </header>
    <div id="view-list" class="pt-14">
        <section class="bg-gradient-to-br from-violet-600 to-purple-700 text-white py-10 px-4 text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMyI+PHBhdGggZD0iTTM2IDM0djItSDI0di0yaDEyek0zNiAyNHYySDI0di0yaDEyek0zNiAxNHYySDI0di0yaDEyeiIvPjwvZz48L2c+PC9zdmc+')] opacity-40"></div>
            <div class="relative z-10">
                <h1 class="text-2xl sm:text-4xl font-black mb-2">Top Up Game Favoritmu</h1>
                <p class="text-violet-200 text-sm sm:text-base mb-6 max-w-lg mx-auto">Pilih game, masukkan ID, bayar QRIS — otomatis masuk! Tersedia 100+ game populer.</p>
                <div class="max-w-md mx-auto relative">
                    <input type="text" id="searchGame" placeholder="Cari game..." class="w-full py-3 pl-10 pr-4 rounded-xl text-slate-800 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-violet-300" oninput="filterGames()">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>
        </section>
        <main class="flex-grow max-w-7xl mx-auto px-4 py-8">
            <h2 class="section-title"><i class="fa-solid fa-grid-2 text-violet-400 mr-2"></i>Semua Game</h2>
            <div id="game-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-3 sm:gap-4"></div>
            <p id="no-game" class="text-center text-slate-500 py-10 hidden">Game tidak ditemukan.</p>
        </main>
    </div>
    <div id="view-detail" class="hidden pt-14">
        <main class="flex-grow max-w-2xl mx-auto px-4 py-6">
            <button onclick="backToList()" class="text-sm font-bold text-violet-400 hover:text-violet-300 mb-5 transition flex items-center gap-1.5"><i class="fa-solid fa-arrow-left"></i> Kembali ke daftar game</button>
            <div class="glass-card p-5 sm:p-6 mb-6">
                <div class="flex items-center gap-4 mb-5">
                    <div id="detail-icon" class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl shrink-0"></div>
                    <div class="min-w-0">
                        <h2 id="detail-title" class="text-xl font-black text-white truncate"></h2>
                        <p class="text-xs text-slate-400">Pilih nominal & isi data game</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="label-input">User ID / UID <span class="text-red-500">*</span></label>
                        <input type="text" id="input-uid" placeholder="Contoh: 12345678" class="input-field">
                    </div>
                    <div id="zone-input" class="hidden">
                        <label class="label-input">Zone ID <span class="text-red-500">*</span></label>
                        <input type="text" id="input-zone" placeholder="Contoh: 1234" class="input-field">
                    </div>
                    <div>
                        <label class="label-input">Random ID Telegram <span class="text-red-500">*</span></label>
                        <input type="text" id="input-randomid" placeholder="ID-ABC123" class="input-field uppercase">
                        <p class="text-[10px] text-slate-500 mt-1.5 flex items-center gap-1"><i class="fa-solid fa-circle-info text-violet-400"></i> Belum punya? Ketik <b class="text-slate-300">/daftar</b> di <a href="https://t.me/RullzyeBot" target="_blank" class="text-violet-400 font-bold underline">Bot Telegram</a></p>
                    </div>
                </div>
            </div>
            <h3 class="section-title"><i class="fa-solid fa-coins text-violet-400 mr-1.5"></i>Pilih Nominal</h3>
            <div id="nominal-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6"></div>
            <button id="btn-buy" class="btn-primary flex items-center justify-center gap-2" onclick="submitOrder()">
                <i class="fa-solid fa-cart-shopping"></i> Beli Sekarang
            </button>
        </main>
    </div>
    <div id="modal-pay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] hidden items-center justify-center p-4" style="display:none;">
        <div class="bg-[#0b0f1a] rounded-[32px] w-full max-w-md p-6 sm:p-8 border border-white/8 shadow-2xl relative modal-pop">
            <button onclick="closePayModal()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center border border-white/10 transition"><i class="fa-solid fa-xmark text-slate-400 text-sm"></i></button>
            <div id="pay-loader" class="text-center py-10">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-[3px] border-violet-500 border-t-transparent mb-4"></div>
                <p class="font-extrabold text-white">Memproses Pesanan...</p>
            </div>
            <div id="pay-result" class="hidden text-center"></div>
        </div>
    </div>
    <script>
        let allProducts = [];
        let selectedGame = null;
        let selectedProduct = null;
        fetch('/api/topup-products')
            .then(r => r.json())
            .then(res => {
                if (res.success && res.products) {
                    allProducts = res.products;
                    renderGameList(allProducts);
                } else {
                    document.getElementById('game-grid').innerHTML = '<p class="col-span-full text-center text-slate-400 py-10">Gagal memuat game.</p>';
                }
            });
        function renderGameList(products) {
            const games = {};
            products.forEach(p => {
                const name = p.name || '';
                const dash = name.indexOf(' - ');
                const game = dash > -1 ? name.substring(0, dash).trim() : 'Other';
                if (!games[game]) games[game] = { name: game, products: [], icon: getGameIcon(game) };
                games[game].products.push(p);
            });
            const grid = document.getElementById('game-grid');
            grid.innerHTML = Object.values(games).map(g => `
                <div class="game-card p-4 text-center" onclick="openGame('${g.name.replace(/'/g,"\\'")}')">
                    <div class="w-12 h-12 ${g.icon.bg} rounded-xl flex items-center justify-center mx-auto mb-2">
                        <i class="fa-solid ${g.icon.icon} ${g.icon.text} text-xl"></i>
                    </div>
                    <h3 class="font-bold text-white text-xs">${g.name}</h3>
                    <p class="text-[10px] text-slate-400 mt-1">${g.products.length} item</p>
                </div>
            `).join('');
        }
        function filterGames() {
            const q = document.getElementById('searchGame').value.toLowerCase();
            const cards = document.querySelectorAll('.game-card');
            let found = false;
            cards.forEach(c => {
                const name = c.querySelector('h3').innerText.toLowerCase();
                if (q === '' || name.includes(q)) { c.style.display = ''; found = true; }
                else c.style.display = 'none';
            });
            document.getElementById('no-game').classList.toggle('hidden', found);
        }
        function getGameIcon(game) {
            const g = game.toLowerCase();
            if (g.includes('mobile legend') || g.includes('ml')) return { icon: 'fa-gamepad', bg: 'bg-blue-500/10', text: 'text-blue-400' };
            if (g.includes('free fire') || g.includes('ff')) return { icon: 'fa-fire', bg: 'bg-orange-500/10', text: 'text-orange-400' };
            if (g.includes('pubg')) return { icon: 'fa-crosshairs', bg: 'bg-yellow-500/10', text: 'text-yellow-400' };
            if (g.includes('cod') || g.includes('call of duty')) return { icon: 'fa-crosshairs', bg: 'bg-green-500/10', text: 'text-green-400' };
            if (g.includes('arena of valor') || g.includes('aov')) return { icon: 'fa-shield', bg: 'bg-red-500/10', text: 'text-red-400' };
            if (g.includes('honor of kings') || g.includes('hok')) return { icon: 'fa-crown', bg: 'bg-amber-500/10', text: 'text-amber-400' };
            if (g.includes('honkai') || g.includes('hsr')) return { icon: 'fa-star', bg: 'bg-indigo-500/10', text: 'text-indigo-400' };
            if (g.includes('genshin')) return { icon: 'fa-wind', bg: 'bg-sky-500/10', text: 'text-sky-400' };
            if (g.includes('valorant')) return { icon: 'fa-crosshairs', bg: 'bg-rose-500/10', text: 'text-rose-400' };
            if (g.includes('magic chess')) return { icon: 'fa-chess-knight', bg: 'bg-purple-500/10', text: 'text-purple-400' };
            if (g.includes('identity v')) return { icon: 'fa-mask', bg: 'bg-gray-500/10', text: 'text-gray-400' };
            if (g.includes('fc mobile')) return { icon: 'fa-futbol', bg: 'bg-emerald-500/10', text: 'text-emerald-400' };
            if (g.includes('blood strike')) return { icon: 'fa-skull', bg: 'bg-zinc-500/10', text: 'text-zinc-400' };
            if (g.includes('au2')) return { icon: 'fa-dragon', bg: 'bg-teal-500/10', text: 'text-teal-400' };
            if (g.includes('delta force')) return { icon: 'fa-helicopter', bg: 'bg-slate-500/10', text: 'text-slate-400' };
            return { icon: 'fa-gamepad', bg: 'bg-violet-500/10', text: 'text-violet-400' };
        }
        function openGame(gameName) {
            selectedGame = gameName;
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            const g = getGameIcon(gameName);
            document.getElementById('detail-icon').className = `w-14 h-14 rounded-2xl flex items-center justify-center text-2xl ${g.bg} ${g.text}`;
            document.getElementById('detail-icon').innerHTML = `<i class="fa-solid ${g.icon}"></i>`;
            document.getElementById('detail-title').innerText = gameName;
            const products = allProducts.filter(p => {
                const name = p.name || '';
                const dash = name.indexOf(' - ');
                const game = dash > -1 ? name.substring(0, dash).trim() : 'Other';
                return game === gameName;
            });
            const needsZone = products.some(p => p.isZoneRequired);
            document.getElementById('zone-input').classList.toggle('hidden', !needsZone);
            const grid = document.getElementById('nominal-grid');
            selectedProduct = null;
            grid.innerHTML = products.map(p => {
                const name = p.name || '';
                const dash = name.indexOf(' - ');
                const itemName = dash > -1 ? name.substring(dash + 3).trim() : name;
                return `<button class="nominal-btn rounded-xl p-3 text-left" onclick="selectNominal(this, '${p.id}','${itemName.replace(/'/g,"\\'")}',${p.price},${p.isZoneRequired})">
                    <p class="font-bold text-white text-xs">${itemName}</p>
                    <p class="text-xs text-violet-400 font-extrabold mt-1">Rp ${p.price.toLocaleString('id-ID')}</p>
                </button>`;
            }).join('');
            document.getElementById('input-uid').value = '';
            document.getElementById('input-zone').value = '';
            document.getElementById('input-randomid').value = '';
            window.scrollTo(0,0);
        }
        function selectNominal(btn, id, name, price, isZoneRequired) {
            document.querySelectorAll('.nominal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedProduct = { id, name, price, isZoneRequired };
        }
        function backToList() {
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
        }
        function submitOrder() {
            if (!selectedProduct) return alert('Pilih nominal dulu!');
            const uid = document.getElementById('input-uid').value.trim();
            const zone = document.getElementById('input-zone').value.trim();
            const randomId = document.getElementById('input-randomid').value.trim().toUpperCase();
            if (!uid) return alert('Masukkan User ID!');
            if (selectedProduct.isZoneRequired && !zone) return alert('Masukkan Zone ID!');
            if (!randomId) return alert('Masukkan Random ID Telegram!');
            document.getElementById('modal-pay').style.display = 'flex';
            document.getElementById('pay-loader').classList.remove('hidden');
            document.getElementById('pay-result').classList.add('hidden');
            fetch('/api/topup-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ service: selectedProduct.id, target: uid, targetZone: zone || undefined, productName: selectedProduct.name, displayPrice: selectedProduct.price, randomId: randomId, nickname: uid })
            })
            .then(r => r.json())
            .then(res => {
                document.getElementById('pay-loader').classList.add('hidden');
                const r = document.getElementById('pay-result');
                r.classList.remove('hidden');
                if (res.status) {
                    r.innerHTML = `
                        <div class="text-emerald-400 text-3xl mb-3">&#10003;</div>
                        <h3 class="text-lg font-black text-white mb-2">QRIS Siap!</h3>
                        <p class="text-sm text-slate-400 mb-4">Total: <b class="text-white">Rp ${res.invoice.amount.toLocaleString('id-ID')}</b></p>
                        <div class="bg-white/5 p-3 rounded-3xl mb-4 inline-block border border-white/10"><img src="${res.invoice.qr_url}" class="w-40 h-40 mx-auto rounded-xl"></div>
                        <a href="${res.invoice.botLink}" target="_blank" class="block w-full bg-violet-600 text-white font-bold py-3 rounded-xl text-sm mb-2"><i class="fa-brands fa-telegram mr-2"></i> Konfirmasi via Bot</a>
                        <button onclick="closePayModal()" class="text-slate-500 text-xs font-bold uppercase">Tutup</button>
                    `;
                } else {
                    r.innerHTML = `
                        <div class="text-red-400 text-3xl mb-3">&#10007;</div>
                        <h3 class="text-lg font-black text-white mb-2">Gagal</h3>
                        <p class="text-sm text-slate-400 mb-4">${res.message || 'Gagal membuat pesanan'}</p>
                        <button onclick="closePayModal()" class="text-slate-500 text-xs font-bold uppercase">Tutup</button>
                    `;
                }
            })
            .catch(() => {
                document.getElementById('pay-loader').classList.add('hidden');
                const r = document.getElementById('pay-result');
                r.classList.remove('hidden');
                r.innerHTML = '<p class="text-white font-bold">Jaringan bermasalah.</p><button onclick="closePayModal()" class="text-slate-500 text-xs font-bold uppercase mt-3">Tutup</button>';
            });
        }
        function closePayModal() { document.getElementById('modal-pay').style.display = 'none'; }
        document.getElementById('modal-pay').addEventListener('click', function(e) { if (e.target === this) closePayModal(); });
    </script>
</body>
</html>
